req||[]).map(mini).join('')||'<p class="empty">直接の前提はありません。</p>';document.getElementById('next').innerHTML=(n.next||[]).map(mini).join('')||'<p class="empty">次項目はありません。</p>';const path=[];let cur=selected,guard=0;while(cur&&guard++<5){path.unshift(cur);cur=(byId.get(cur).prereq||[])[0]}document.getElementById('chain').innerHTML=path.map((id,i)=>{const x=byId.get(id);return`${i?'<span class="arrow">→</span>':''}<div class="chain-node"><strong>${esc(x.code)}</strong><br>${esc(x.item)}<br><span class="pill ${x.status}">${labels[x.status]}</span></div>`}).join('')}document.getElementById('tabs').onclick=e=>{const b=e.target.closest('[data-grade]');if(!b)return;grade=b.dataset.grade;document.querySelectorAll('#tabs button').forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false'));render()};search.oninput=render;unit.onchange=render;document.getElementById('allOpen').onclick=()=>document.querySelectorAll('.unit').forEach(x=>x.classList.add('open'));document.getElementById('rec').onclick=()=>{search.value='';unit.value='all';render();document.querySelectorAll('.unit').forEach(x=>x.classList.add('open'))};setJump(id=>{selected=id;render()});render();
