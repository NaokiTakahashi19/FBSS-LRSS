<script>
  // ○ / × ボタンをラジオボタンのように排他的に選択できるようにする
  document.addEventListener('DOMContentLoaded', () => {
    const cards = document.querySelectorAll('main .rounded-2xl');

    const deactivate = (btn) => {
      btn.classList.remove('is-active', 'is-circle', 'is-cross');
      const span = btn.querySelector('span');
      if (!span) return;

      // 文字色を元に戻す（○は青、×は赤）
      const t = (span.textContent || '').trim();
      span.style.color = '';
      if (t === '○') {
        span.classList.remove('text-white');
        span.classList.add('text-primary');
      } else if (t === '×') {
        span.classList.remove('text-white');
        span.classList.add('text-incorrect');
      }
    };

    const activate = (btn, type) => {
      btn.classList.add('is-active');
      btn.classList.add(type === 'circle' ? 'is-circle' : 'is-cross');

      const span = btn.querySelector('span');
      if (!span) return;
      span.classList.remove('text-primary', 'text-incorrect');
      span.classList.add('text-white');
    };

    cards.forEach(card => {
      const btns = Array.from(card.querySelectorAll('button.w-16.h-16'));
      if (btns.length < 2) return;

      btns.forEach(btn => {
        btn.classList.add('judge-btn');
        btn.addEventListener('click', () => {
          // 同じカード内の○/×は同時選択できない（ラジオボタン）
          btns.forEach(deactivate);
          const label = (btn.querySelector('span')?.textContent || '').trim();
          activate(btn, label === '○' ? 'circle' : 'cross');
        });
      });
    });
  });
</script>
