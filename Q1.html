<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>数学・復習ドリル画面（選択）</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans JP", "sans-serif"],
                        "body": ["Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom radio styling to ensure the whole card is clickable and styles change */
        .radio-card-input:checked + .radio-card-content {
            border-color: #136dec;
            background-color: rgba(19, 109, 236, 0.05);
            box-shadow: 0 0 0 1px #136dec;
        }
        .radio-card-input:checked + .radio-card-content .radio-indicator {
            border-color: #136dec;
            background-image: radial-gradient(circle, #136dec 40%, transparent 45%);
        }
        /* Ensure Japanese text looks good */
        body {
            font-family: 'Lexend', 'Noto Sans JP', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-50 transition-colors duration-200">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="flex items-center justify-between bg-white dark:bg-slate-800 p-4 shadow-sm z-10 shrink-0">
<div class="flex items-center justify-start w-12">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="flex flex-col items-center flex-1">
<h2 class="text-sm font-bold text-slate-400 dark:text-slate-400 uppercase tracking-wider mb-0.5">数学 I</h2>
<h1 class="text-base sm:text-lg font-bold text-slate-900 dark:text-white leading-tight text-center truncate px-2">
                    第3章：図形と相似
                </h1>
</div>
<div class="flex items-center justify-end w-12 gap-2">
<button class="flex items-center justify-center text-slate-700 dark:text-slate-200 hover:text-primary transition-colors">
<span class="material-symbols-outlined">pause_circle</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto overflow-x-hidden p-4 sm:p-6 pb-24 scroll-smooth">
<div class="max-w-3xl mx-auto flex flex-col gap-6">
<!-- Progress Bar & Timer -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold tracking-wide">
<span class="text-primary text-lg">問 3</span> <span class="text-slate-400 dark:text-slate-600">/ 10</span>
</p>
<div class="flex items-center gap-1 text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-md">
<span class="material-symbols-outlined text-[18px]">timer</span>
<span class="text-xs font-mono font-medium">04:12</span>
</div>
</div>
<div class="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-out" style="width: 30%"></div>
</div>
</div>
<!-- Question Card -->
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
<div class="flex flex-col md:flex-row">
<!-- Image Area -->
<div class="w-full md:w-5/12 bg-slate-50 dark:bg-slate-900 relative min-h-[200px] md:min-h-[260px] flex items-center justify-center p-4">
<!-- Placeholder for geometric diagram -->
<div class="w-full h-full bg-contain bg-center bg-no-repeat rounded-lg" data-alt="Geometric diagram showing two similar triangles with labeled sides including x" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCX8e6Uazz4yLH9IM_bZXWcN4dWD2rau0bnVG2HaiacdCyBEwfWgzalZAVLMxUnuFyr_1issb9s__AU8h1KN-qKfwUA6PiuKxfl59Ilt33B0B34IX9X9Qpn9XX42p2XTjmNaumkAAyf-AM72PMMNHh8ag5oGM3MS6Zpsx4ICydlhSFohRnwJXnrRG3Fw48cURuHwmuNQf28vDuMPGFpK1hwNgDtOBTqA3Uq9M3lUx2zgnrFN6PXlgPscPoP_1oQsYnspHJNpmo9mLI');">
</div>
<div class="absolute bottom-2 right-2 bg-black/50 text-white text-[10px] px-2 py-1 rounded backdrop-blur-sm">
                                図 3-2
                            </div>
</div>
<!-- Text Area -->
<div class="w-full md:w-7/12 p-5 md:p-6 flex flex-col justify-center">
<div class="flex items-center gap-2 mb-3">
<span class="bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 text-xs font-bold px-2.5 py-1 rounded-md">基本問題</span>
</div>
<h3 class="text-lg md:text-xl font-bold text-slate-900 dark:text-white leading-relaxed mb-4">
                                次の図で、$\triangle ABC \sim \triangle DEF$ であるとき、$x$ の値を求めなさい。
                            </h3>
<div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-sm">
<span class="material-symbols-outlined text-lg">lightbulb</span>
<span>ヒント: 相似比を利用して比例式を作りましょう</span>
</div>
</div>
</div>
</div>
<!-- Answer Choices (Radio List) -->
<div aria-labelledby="question-label" class="flex flex-col gap-3" role="radiogroup">
<!-- Choice A -->
<label class="cursor-pointer group relative">
<input checked="" class="radio-card-input sr-only" name="answer" type="radio" value="4"/>
<div class="radio-card-content flex items-center p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-blue-300 dark:hover:border-blue-700 transition-all duration-200 shadow-sm">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-lg mr-4 shrink-0 group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 group-hover:text-primary transition-colors">
                                A
                            </div>
<div class="flex-1">
<span class="text-lg font-medium text-slate-800 dark:text-slate-100 font-display">x = 4</span>
</div>
<div class="radio-indicator w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-600 shrink-0 transition-all"></div>
</div>
</label>
<!-- Choice B -->
<label class="cursor-pointer group relative">
<input class="radio-card-input sr-only" name="answer" type="radio" value="6"/>
<div class="radio-card-content flex items-center p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-blue-300 dark:hover:border-blue-700 transition-all duration-200 shadow-sm">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-lg mr-4 shrink-0 group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 group-hover:text-primary transition-colors">
                                B
                            </div>
<div class="flex-1">
<span class="text-lg font-medium text-slate-800 dark:text-slate-100 font-display">x = 6</span>
</div>
<div class="radio-indicator w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-600 shrink-0 transition-all"></div>
</div>
</label>
<!-- Choice C -->
<label class="cursor-pointer group relative">
<input class="radio-card-input sr-only" name="answer" type="radio" value="3sqrt2"/>
<div class="radio-card-content flex items-center p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-blue-300 dark:hover:border-blue-700 transition-all duration-200 shadow-sm">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-lg mr-4 shrink-0 group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 group-hover:text-primary transition-colors">
                                C
                            </div>
<div class="flex-1">
<span class="text-lg font-medium text-slate-800 dark:text-slate-100 font-display">x = 3√2</span>
</div>
<div class="radio-indicator w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-600 shrink-0 transition-all"></div>
</div>
</label>
<!-- Choice D -->
<label class="cursor-pointer group relative">
<input class="radio-card-input sr-only" name="answer" type="radio" value="8"/>
<div class="radio-card-content flex items-center p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-blue-300 dark:hover:border-blue-700 transition-all duration-200 shadow-sm">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-lg mr-4 shrink-0 group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 group-hover:text-primary transition-colors">
                                D
                            </div>
<div class="flex-1">
<span class="text-lg font-medium text-slate-800 dark:text-slate-100 font-display">x = 8</span>
</div>
<div class="radio-indicator w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-600 shrink-0 transition-all"></div>
</div>
</label>
</div>
</div>
</main>
<!-- Sticky Footer -->
<footer class="fixed bottom-0 w-full bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700 p-4 pb-6 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<div class="max-w-3xl mx-auto flex gap-4">
<button aria-label="Skip Question" class="shrink-0 flex items-center justify-center w-12 h-12 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
<span class="material-symbols-outlined">skip_next</span>
</button>
<button class="flex-1 h-12 bg-primary hover:bg-blue-600 text-white font-bold text-lg rounded-lg shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                    回答する
                </button>
</div>
</footer>
</div>
</body></html>
