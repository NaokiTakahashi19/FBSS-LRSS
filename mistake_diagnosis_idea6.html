const data=JSON.parse(document.getElementById('data').textContent),nodes=data.nodes,labels=data.statusLabels;
const byId=new Map(nodes.map(n=>[n.id,n]));
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function mini(id){const n=byId.get(id);return n?`<button class="mini" data-id="${id}"><strong>${esc(n.code)}</strong> ${esc(n.item)}<br><span class="pill ${n.status}">${labels[n.status]} ${n.mastery}%</span></button>`:''}

const patterns=[{id:'factor-zero',title:'因数分解後に片方の解だけ書く',mistake:'(x-3)(x+5)=0 から x=3 だけ答えた。',target:'m-jh3-A-05-03b',causes:['積が0になる条件が未定着','因数分解後に2つの一次方程式へ分ける意識が弱い']},{id:'sign-factor',title:'因数分解の符号を逆にする',mistake:'x^2+2x-15 を (x+3)(x-5) とした。',target:'m-jh3-A-02-02b',causes:['積と和を見る順番が曖昧','符号の向きを表で確認できていない']},{id:'radical-rationalize',title:'有理化で分母だけにかける',mistake:'1/√3 に対して分母だけ √3 をかけた。',target:'m-jh3-A-04-09b',causes:['分数の同値変形が弱い','平方根の積の計算が未定着']},{id:'simultaneous-method',title:'連立方程式で方法選択を誤る',mistake:'代入法が自然な式を加減法で複雑にした。',target:'m-jh2-A-03-05b',causes:['x=... の形を利用する判断が弱い','式変形の目的が曖昧']}];let selected=patterns[0];function prereqChain(id,seen=new Set()){let out=[];for(const p of byId.get(id)?.prereq||[]){if(seen.has(p))continue;seen.add(p);out.push(p);out=out.concat(prereqChain(p,seen))}return out}function renderPatterns(){document.getElementById('patterns').innerHTML=patterns.map(p=>`<button class="pattern ${p.id===selected.id?'selected':''}" data-pid="${p.id}"><strong>${esc(p.title)}</strong><br><span class="note">${esc(p.mistake)}</span></button>`).join('')}function render(){renderPatterns();const target=byId.get(selected.target),chain=prereqChain(selected.target).map(id=>byId.get(id)).sort((a,b)=>a.mastery-b.mastery).slice(0,8);document.getElementById('mistake').innerHTML=`<strong>誤答例：</strong>${esc(selected.mistake)}<br><strong>関連項目：</strong>${esc(target.code)} ${esc(target.item)}`;document.getElementById('causes').innerHTML=selected.causes.map((c,i)=>`<div class="cause ${i===0?'hot':''}"><strong>原因候補${i+1}</strong><p>${esc(c)}</p></div>`).join('');document.getElementById('related').innerHTML=chain.map(n=>mini(n.id)).join('')||'<p class="empty">関連前提がありません。</p>';document.getElementById('flow').innerHTML=[...chain.slice(0,4),target].map((n,i)=>`${i?'<span class="arrow">→</span>':''}<div class="flow-node"><strong>${esc(n.code)}</strong><br>${esc(n.item)}<br><span class="pill ${n.status}">${labels[n.status]} ${n.mastery}%</span></div>`).join('');document.getElementById('drills').innerHTML=`<div class="cause hot"><strong>1. 原因に直結する確認問題</strong><p>${esc(chain[0]?.item||target.item)} を3問</p></div><div class="cause"><strong>2. 関連項目の基本問題</strong><p>${esc(target.item)} の前提問題を2問</p></div><div class="cause"><strong>3. 元の項目へ戻る問題</strong><p>${esc(target.code)} の類題を1問</p></div>`;document.getElementById('deps').innerHTML=`<h3>${esc(target.code)} ${esc(target.item)}</h3><p class="note">直接前提</p>${(target.prereq||[]).map(mini).join('')||'<p class="empty">なし</p>'}`}document.getElementById('patterns').onclick=e=>{const b=e.target.closest('[data-pid]');if(!b)return;selected=patterns.find(p=>p.id===b.dataset.pid);render()};render();
</script></body></html>
