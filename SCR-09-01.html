<!DOCTYPE html>
<html class="light" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学・復習ドリル（因数分解）</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="data/math-questions-3-a-02.js"></script>

  <style>
    :root{
      --primary:#3f8f76;
      --primary-dark:#2f735e;
      --bg:#edf2df;
      --paper:#fffffb;
      --line:rgba(63,143,118,.2);
      --text:#23332f;
      --muted:#6d7a74;
      --soft:#f5faf2;
      --danger:#ef4444;
      --shadow:0 14px 28px rgba(71,91,82,.09);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100dvh;
      background:var(--bg);
      color:var(--text);
      font-family:"Lexend","Noto Sans JP",sans-serif;
      letter-spacing:0;
      overflow-x:hidden;
    }
    button,a{font:inherit;}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 600,'GRAD' 0,'opsz' 24;
      line-height:1;
      vertical-align:middle;
    }
    .lesson-header{
      position:fixed;
      inset:0 0 auto 0;
      z-index:50;
      background:rgba(255,255,251,.96);
      border-bottom:1px solid rgba(63,143,118,.18);
      backdrop-filter:blur(12px);
    }
    .header-inner{
      width:min(1180px,100%);
      margin:0 auto;
      padding:12px 24px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .icon-button{
      width:42px;
      height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:0;
      border-radius:999px;
      background:transparent;
      color:#1f2d29;
      cursor:pointer;
      transition:background .18s ease, transform .18s ease;
    }
    .icon-button:hover{background:rgba(63,143,118,.1);}
    .icon-button:active{transform:scale(.96);}
    .title-block{text-align:center;}
    .title-block h1{
      margin:0;
      font-size:16px;
      font-weight:700;
      line-height:1.25;
    }
    .title-block p{
      margin:3px 0 0;
      font-size:11px;
      font-weight:600;
      color:#66756f;
    }
    .progress-track{
      width:100%;
      height:5px;
      background:rgba(63,143,118,.1);
    }
    .progress-bar{
      display:block;
      height:100%;
      width:10%;
      background:var(--primary);
      transition:width .34s ease;
    }
    .page{
      width:min(1180px,100%);
      margin:0 auto;
      padding:104px 24px 104px;
      opacity:0;
      transform:translateY(8px);
      transition:opacity .26s ease, transform .26s ease;
    }
    body.is-ready .page{opacity:1;transform:none;}
    body.is-leaving .page{opacity:0;transform:translateY(-4px);}
    .lesson-grid{
      display:grid;
      gap:18px;
      grid-template-columns:1fr;
      grid-template-areas:
        "problem"
        "answer"
        "ocr"
        "calc";
    }
    .card{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
    }
    .problem-card{
      grid-area:problem;
      min-height:330px;
      padding:26px 28px;
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .answer-card{grid-area:answer;padding:20px;}
    .ocr-card{grid-area:ocr;padding:18px 20px;}
    .calc-card{grid-area:calc;padding:20px;}
    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .section-label{
      margin:0 0 8px;
      color:#8a9690;
      font-size:12px;
      font-weight:700;
    }
    .problem-prompt{
      margin:0;
      color:#111827;
      font-size:clamp(14px,1.25vw,17px);
      font-weight:500;
      line-height:1.8;
    }
    .problem-prompt strong{font-weight:700;}
    .difficulty-pill{
      flex:0 0 auto;
      border:1px solid rgba(63,143,118,.18);
      border-radius:999px;
      background:#f8fbf4;
      padding:9px 16px;
      color:#4b5c56;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }
    .formula-area{
      flex:1;
      min-height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 12px 34px;
      text-align:center;
    }
    .test-formula,
    .math-text{
      font-family:"STIX Two Text","Cambria Math","Times New Roman",serif;
      font-style:normal;
      font-variant-numeric:lining-nums;
      text-rendering:geometricPrecision;
      letter-spacing:0;
    }
    .test-formula{
      display:block;
      color:#111827;
      font-size:clamp(1.65rem,2.55vw,2.15rem);
      font-weight:500;
      line-height:1.5;
      word-spacing:.12em;
      overflow-wrap:anywhere;
    }
    .math-var,
    .test-formula .var,
    .math-text .var{
      font-family:"STIX Two Text","Cambria Math","Times New Roman",serif;
      font-style:italic;
      font-weight:500;
    }
    .test-formula sup,
    .math-text sup{
      font-size:.58em;
      line-height:0;
      margin-left:.02em;
    }
    .problem-meta{
      position:absolute;
      right:24px;
      bottom:18px;
      color:#8f9a95;
      font-size:12px;
      font-weight:700;
    }
    .panel-title{
      display:flex;
      align-items:center;
      gap:8px;
      margin:0;
      color:#44554f;
      font-size:15px;
      font-weight:700;
    }
    .panel-title .material-symbols-outlined{color:var(--primary);}
    .tool-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .tool-group{
      display:flex;
      align-items:center;
      gap:2px;
    }
    .tool-button{
      min-width:42px;
      height:38px;
      border:1px solid rgba(63,143,118,.22);
      background:#fff;
      color:#6c7a74;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      cursor:pointer;
      transition:background .18s ease,color .18s ease,box-shadow .18s ease,transform .18s ease;
    }
    .tool-button:first-child{border-radius:9px 0 0 9px;}
    .tool-button:last-child{border-radius:0 9px 9px 0;}
    .tool-button.clear{
      color:var(--danger);
      font-size:12px;
      font-weight:700;
    }
    .tool-button.tool-active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(63,143,118,.18);
    }
    .tool-button:active{transform:scale(.97);}
    .canvas-box{
      position:relative;
      width:100%;
      overflow:hidden;
      background:#fff;
      border:2px solid rgba(63,143,118,.28);
      border-radius:16px;
      background-image:radial-gradient(rgba(63,143,118,.24) 1px, transparent 1px);
      background-size:20px 20px;
    }
    .answer-canvas{height:210px;}
    .calc-canvas{
      height:min(44vh,420px);
      min-height:310px;
      border-style:dashed;
    }
    .canvas-box canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      touch-action:none;
    }
    .canvas-label{
      position:absolute;
      top:11px;
      left:12px;
      z-index:5;
      border:1px solid rgba(63,143,118,.16);
      border-radius:8px;
      background:rgba(255,255,255,.88);
      color:var(--primary);
      padding:5px 9px;
      font-size:11px;
      font-weight:700;
      pointer-events:none;
    }
    .canvas-note{
      position:absolute;
      top:11px;
      right:12px;
      z-index:5;
      border:1px solid rgba(63,143,118,.12);
      border-radius:8px;
      background:#f4faf2;
      color:#63716b;
      padding:5px 9px;
      font-size:11px;
      font-weight:700;
      pointer-events:none;
    }
    .placeholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#c2cbc6;
      font-size:14px;
      font-weight:600;
      pointer-events:none;
      text-align:center;
      padding:24px;
    }
    .ocr-trigger{
      position:absolute;
      right:12px;
      bottom:12px;
      z-index:10;
      display:inline-flex;
      align-items:center;
      gap:7px;
      height:42px;
      padding:0 16px;
      border:0;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      font-size:13px;
      font-weight:700;
      box-shadow:0 8px 16px rgba(63,143,118,.22);
      cursor:pointer;
      transition:filter .18s ease, transform .18s ease;
    }
    .ocr-trigger:hover{filter:brightness(1.05);}
    .ocr-trigger:active{transform:scale(.97);}
    .recognition-box{
      min-height:52px;
      display:flex;
      align-items:center;
      border:1px solid rgba(63,143,118,.14);
      border-radius:999px;
      background:#fff;
      padding:12px 16px;
      color:#8b9892;
      font-size:14px;
      font-weight:600;
    }
    .footer{
      position:fixed;
      inset:auto 0 0 0;
      z-index:40;
      border-top:1px solid rgba(63,143,118,.16);
      background:rgba(255,255,251,.94);
      backdrop-filter:blur(12px);
      padding:14px 24px;
    }
    .footer-inner{
      width:min(1180px,100%);
      margin:0 auto;
      display:flex;
      justify-content:flex-end;
    }
    .primary-action{
      min-width:176px;
      min-height:52px;
      border:0;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:0 28px;
      font-size:15px;
      font-weight:700;
      text-decoration:none;
      box-shadow:0 10px 20px rgba(63,143,118,.22);
      cursor:pointer;
      transition:filter .18s ease, transform .18s ease;
    }
    .primary-action:hover{filter:brightness(1.05);}
    .primary-action:active{transform:translateY(1px) scale(.99);}
    @media (orientation:landscape) and (min-width:900px){
      .lesson-grid{
        grid-template-columns:minmax(0,.88fr) minmax(440px,.72fr);
        grid-template-areas:
          "problem answer"
          "problem ocr"
          "calc calc";
        align-items:start;
      }
      .answer-canvas{height:224px;}
      .problem-card{min-height:354px;}
    }
    @media (max-width:640px){
      .header-inner{padding-inline:14px;}
      .page{padding:92px 14px 104px;}
      .problem-card,.answer-card,.ocr-card,.calc-card{padding:18px;}
      .card-head{display:block;}
      .difficulty-pill{display:inline-flex;margin-top:14px;}
      .problem-meta{position:static;margin-top:10px;text-align:right;}
      .footer-inner{justify-content:stretch;}
      .primary-action{width:100%;}
    }
  </style>
</head>

<body>
  <header class="lesson-header">
    <div class="header-inner">
      <button id="backBtn" class="icon-button" type="button" aria-label="前の画面へ戻る">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <div class="title-block">
        <h1 id="unitTitle">因数分解</h1>
        <p id="questionCounter">第 1 問 / 全 10 問</p>
      </div>
      <button id="closeBtn" class="icon-button" type="button" aria-label="閉じる">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="progress-track"><span id="progressBar" class="progress-bar"></span></div>
  </header>

  <main class="page lesson-grid">
    <section class="card problem-card" aria-labelledby="problemTitle">
      <div class="card-head">
        <div>
          <p class="section-label" id="problemTitle">問題</p>
          <p class="problem-prompt">
            <strong id="questionIndexLabel">【問題1】</strong>
            <span id="questionPrompt">次の式を因数分解しなさい。</span>
          </p>
        </div>
        <div class="difficulty-pill" id="difficultyLabel">難易度 180 / 300</div>
      </div>

      <div class="formula-area">
        <span class="test-formula" id="questionFormula" aria-live="polite"></span>
      </div>

      <div class="problem-meta" id="problemNumberLabel">問題番号：3-A-02-01-b-01</div>
    </section>

    <section class="card answer-card" aria-labelledby="answerTitle">
      <div class="tool-row">
        <h2 class="panel-title" id="answerTitle">
          <span class="material-symbols-outlined">edit</span>
          あなたの解答
        </h2>
        <div class="tool-group" aria-label="回答欄ツール">
          <button type="button" data-target="answer" data-tool="pen" class="tool-button tool-active" aria-label="回答欄にペンで書く">
            <span class="material-symbols-outlined">edit</span>
          </button>
          <button type="button" data-target="answer" data-tool="eraser" class="tool-button" aria-label="回答欄の文字を消す">
            <span class="material-symbols-outlined">ink_eraser</span>
          </button>
          <button type="button" data-target="answer" data-tool="clear" class="tool-button clear" aria-label="回答欄をクリア">クリア</button>
        </div>
      </div>

      <div class="canvas-box answer-canvas">
        <div class="canvas-label">回答欄</div>
        <button type="button" class="ocr-trigger" aria-label="回答欄を文字認識">
          <span class="material-symbols-outlined">spellcheck</span>
          文字認識
        </button>
        <canvas id="answerCanvas"></canvas>
        <p id="answerPlaceholder" class="placeholder">答えはここに書いてください</p>
      </div>
    </section>

    <section class="card ocr-card" aria-labelledby="ocrTitle">
      <h2 class="panel-title" id="ocrTitle">
        <span class="material-symbols-outlined">visibility</span>
        認識結果
      </h2>
      <div class="recognition-box" id="ocrResultText">回答欄の文字認識ボタンを押してください</div>
    </section>

    <section class="card calc-card" aria-labelledby="calcTitle">
      <div class="tool-row">
        <h2 class="panel-title" id="calcTitle">
          <span class="material-symbols-outlined">edit_note</span>
          計算欄
        </h2>
        <div class="tool-group" aria-label="計算欄ツール">
          <button type="button" data-target="calc" data-tool="pen" class="tool-button tool-active" aria-label="計算欄にペンで書く">
            <span class="material-symbols-outlined">edit</span>
          </button>
          <button type="button" data-target="calc" data-tool="eraser" class="tool-button" aria-label="計算欄の文字を消す">
            <span class="material-symbols-outlined">ink_eraser</span>
          </button>
          <button type="button" data-target="calc" data-tool="clear" class="tool-button clear" aria-label="計算欄をクリア">クリア</button>
        </div>
      </div>

      <div class="canvas-box calc-canvas">
        <div class="canvas-label">計算欄</div>
        <div class="canvas-note">途中式・メモ用</div>
        <canvas id="calcCanvas"></canvas>
        <p id="calcPlaceholder" class="placeholder">途中式や計算メモをここに書いてください</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <button id="gradeBtn" class="primary-action" type="button">
        採点する
        <span class="material-symbols-outlined">check_circle</span>
      </button>
    </div>
  </footer>

  <script>
    (function(){
      const data = window.MATH_QUESTIONS_3_A_02 || { unitTitle: '因数分解', questions: [] };
      const questions = Array.isArray(data.questions) ? data.questions : [];
      const total = Math.max(questions.length, 1);
      const PEN_COLOR = '#111827';
      let currentQuestion = null;
      let currentIndex = getQuestionIndex();

      function escapeHtml(value){
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
          '&':'&amp;',
          '<':'&lt;',
          '>':'&gt;',
          '"':'&quot;',
          "'":'&#39;'
        }[ch]));
      }

      function getQuestionIndex(){
        const params = new URLSearchParams(window.location.search);
        const fromQuery = Number(params.get('q'));
        const fromSession = Number(sessionStorage.getItem('currentMathQuestionIndex'));
        const candidate = Number.isFinite(fromQuery) && fromQuery > 0 ? fromQuery : fromSession;
        if(!Number.isFinite(candidate) || candidate < 1) return 1;
        return Math.min(Math.max(Math.round(candidate), 1), total);
      }

      function normalizeMathSource(raw){
        return String(raw ?? '')
          .replace(/\\begin\{[^}]+\}|\\end\{[^}]+\}/g, '')
          .replace(/\\hl(?:blue|pink)\{([^{}]*)\}/g, '$1')
          .replace(/\\left|\\right/g, '')
          .replace(/\\times/g, '×')
          .replace(/\\cdot/g, '・')
          .replace(/\\qquad|\\quad/g, '  ')
          .replace(/\\,/g, ' ')
          .replace(/\\\[/g, '')
          .replace(/\\\]/g, '')
          .replace(/\$/g, '')
          .replace(/&/g, '')
          .replace(/\\\\/g, '  ')
          .replace(/\\([{}])/g, '$1')
          .replace(/\\/g, '')
          .trim();
      }

      function renderMath(raw){
        const source = normalizeMathSource(raw);
        let html = '';
        for(let i = 0; i < source.length; i++){
          const ch = source[i];
          if(ch === '^'){
            let exponent = '';
            if(source[i + 1] === '{'){
              const end = source.indexOf('}', i + 2);
              if(end !== -1){
                exponent = source.slice(i + 2, end);
                i = end;
              }
            } else if(source[i + 1]){
              exponent = source[i + 1];
              i += 1;
            }
            html += '<sup>' + renderMath(exponent) + '</sup>';
          } else if(/[A-Za-z]/.test(ch)){
            html += '<span class="var math-var">' + escapeHtml(ch) + '</span>';
          } else if(ch === '-'){
            html += ' &minus; ';
          } else if(ch === '+'){
            html += ' + ';
          } else if(ch === '='){
            html += ' = ';
          } else if(ch === '×' || ch === '・'){
            html += ' ' + ch + ' ';
          } else if(ch === ','){
            html += ', ';
          } else {
            html += escapeHtml(ch);
          }
        }
        return html
          .replace(/\s+/g, ' ')
          .replace(/\(\s+/g, '(')
          .replace(/\s+\)/g, ')')
          .trim();
      }

      function setText(id, text){
        const el = document.getElementById(id);
        if(el) el.textContent = text;
      }

      function renderQuestion(){
        currentQuestion = questions[currentIndex - 1] || questions[0] || {
          prompt:'次の式を因数分解しなさい。',
          formula:'3x^2y+6xy',
          irtDifficulty:205,
          problemNumber:'3-A-02-01-b-01'
        };
        sessionStorage.setItem('currentMathQuestionIndex', String(currentIndex));
        setText('unitTitle', data.unitTitle || '因数分解');
        setText('questionCounter', `第 ${currentIndex} 問 / 全 ${total} 問`);
        setText('questionIndexLabel', `【問題${currentIndex}】`);
        setText('questionPrompt', currentQuestion.prompt || '次の式を因数分解しなさい。');
        setText('difficultyLabel', `難易度 ${currentQuestion.irtDifficulty ?? '-'} / 300`);
        setText('problemNumberLabel', `問題番号：${currentQuestion.problemNumber || currentQuestion.itemId || '-'}`);
        const formula = document.getElementById('questionFormula');
        if(formula){
          formula.innerHTML = renderMath(currentQuestion.formula);
          formula.setAttribute('aria-label', normalizeMathSource(currentQuestion.formula));
        }
        const progress = document.getElementById('progressBar');
        if(progress) progress.style.width = `${Math.max(8, Math.round(currentIndex / total * 100))}%`;
      }

      function resizeCanvas(canvas){
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        let dataUrl = null;
        try{ dataUrl = canvas.toDataURL(); }catch(e){}
        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));
        const ctx = canvas.getContext('2d');
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if(dataUrl && dataUrl.length > 20 && dataUrl !== 'data:,'){
          const img = new Image();
          img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
          img.src = dataUrl;
        }
        return ctx;
      }

      function getPoint(canvas, e){
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x:(e.clientX - rect.left) * scaleX,
          y:(e.clientY - rect.top) * scaleY
        };
      }

      function setupHandwriteArea(areaKey, canvasId, placeholderId){
        const canvas = document.getElementById(canvasId);
        const placeholder = document.getElementById(placeholderId);
        if(!canvas) return null;
        let ctx = resizeCanvas(canvas);
        let drawing = false;
        let tool = 'pen';

        function applyTool(){
          if(tool === 'eraser'){
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 18;
            ctx.strokeStyle = 'rgba(0,0,0,1)';
          } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = 3;
            ctx.strokeStyle = PEN_COLOR;
          }
        }
        function hidePlaceholder(){ if(placeholder) placeholder.style.display = 'none'; }
        function showPlaceholder(){ if(placeholder) placeholder.style.display = 'flex'; }
        function pointerDown(e){
          drawing = true;
          canvas.setPointerCapture?.(e.pointerId);
          hidePlaceholder();
          applyTool();
          const p = getPoint(canvas, e);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        }
        function pointerMove(e){
          if(!drawing) return;
          applyTool();
          const p = getPoint(canvas, e);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        }
        function pointerUp(){
          drawing = false;
          ctx.closePath();
        }
        function clear(){
          ctx.save();
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.restore();
          showPlaceholder();
        }
        function setTool(nextTool){
          tool = nextTool;
          applyTool();
        }
        function hasInk(){
          try{
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for(let i = 3; i < pixels.length; i += 4){
              if(pixels[i] !== 0) return true;
            }
          }catch(e){}
          return false;
        }
        canvas.addEventListener('pointerdown', pointerDown);
        canvas.addEventListener('pointermove', pointerMove);
        canvas.addEventListener('pointerup', pointerUp);
        canvas.addEventListener('pointercancel', pointerUp);
        canvas.addEventListener('pointerleave', pointerUp);
        return {
          key:areaKey,
          canvas,
          clear,
          setTool,
          showPlaceholder,
          refreshCtx(){
            ctx = resizeCanvas(canvas);
            applyTool();
          },
          hasInk
        };
      }

      function setActiveButton(targetKey, tool){
        document.querySelectorAll(`[data-target="${targetKey}"][data-tool]`).forEach((button) => {
          button.classList.toggle('tool-active', button.dataset.tool === tool);
        });
      }

      function navigateSoft(url){
        document.body.classList.add('is-leaving');
        window.setTimeout(() => {
          window.location.href = url;
        }, 180);
      }

      renderQuestion();

      const areas = {
        answer:setupHandwriteArea('answer', 'answerCanvas', 'answerPlaceholder'),
        calc:setupHandwriteArea('calc', 'calcCanvas', 'calcPlaceholder')
      };
      setActiveButton('answer', 'pen');
      setActiveButton('calc', 'pen');

      document.querySelectorAll('[data-tool][data-target]').forEach((button) => {
        button.addEventListener('click', () => {
          const target = button.dataset.target;
          const tool = button.dataset.tool;
          const area = areas[target];
          if(!area) return;
          if(tool === 'clear'){
            area.clear();
            return;
          }
          area.setTool(tool);
          setActiveButton(target, tool);
        });
      });

      const ro = new ResizeObserver(() => {
        Object.values(areas).forEach((area) => {
          if(!area) return;
          area.refreshCtx();
          if(!area.hasInk()) area.showPlaceholder();
        });
      });
      Object.values(areas).forEach((area) => area && ro.observe(area.canvas));

      document.querySelector('.ocr-trigger')?.addEventListener('click', () => {
        const ocrResult = document.getElementById('ocrResultText');
        if(!ocrResult || !currentQuestion) return;
        ocrResult.className = 'recognition-box math-text';
        ocrResult.innerHTML = renderMath(currentQuestion.answer);
      });

      document.getElementById('gradeBtn')?.addEventListener('click', () => {
        sessionStorage.setItem('currentMathQuestionIndex', String(currentIndex));
        navigateSoft(`SCR-10-01.html?q=${currentIndex}`);
      });
      document.getElementById('backBtn')?.addEventListener('click', () => {
        if(window.history.length > 1){
          window.history.back();
        } else {
          navigateSoft('SCR-002-design-04.html');
        }
      });
      document.getElementById('closeBtn')?.addEventListener('click', () => {
        navigateSoft('SCR-002-design-04.html');
      });

      window.setTimeout(() => document.body.classList.add('is-ready'), 20);
    })();
  </script>
</body>
</html>
