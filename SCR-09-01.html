<script>
(function(){
  // Pen color should be black
  const PEN_COLOR = '#000000';

  function getPoint(canvas, e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function resizeCanvas(canvas){
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    // preserve current drawing
    let dataUrl = null;
    try {
      dataUrl = canvas.toDataURL();
    } catch(e) {}

    canvas.width = Math.max(1, Math.floor(rect.width * ratio));
    canvas.height = Math.max(1, Math.floor(rect.height * ratio));

    const ctx = canvas.getContext('2d');
    // Make 1 unit in CSS px
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (dataUrl && dataUrl.length > 20 && dataUrl !== 'data:,'){
      const img = new Image();
      img.onload = () => {
        // draw in CSS pixel size
        ctx.drawImage(img, 0, 0, rect.width, rect.height);
      };
      img.src = dataUrl;
    }

    return ctx;
  }

  function setupHandwriteArea(areaKey, canvasId, placeholderId){
    const canvas = document.getElementById(canvasId);
    const placeholder = document.getElementById(placeholderId);
    if(!canvas) return null;

    let ctx = resizeCanvas(canvas);
    let drawing = false;
    let tool = 'pen';

    function applyTool(){
      if(tool === 'eraser'){
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 18;
        ctx.strokeStyle = 'rgba(0,0,0,1)';
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.lineWidth = 3;
        ctx.strokeStyle = PEN_COLOR;
      }
    }

    function hidePlaceholder(){
      if(placeholder) placeholder.style.display = 'none';
    }
    function showPlaceholder(){
      if(placeholder) placeholder.style.display = 'flex';
    }

    function pointerDown(e){
      drawing = true;
      canvas.setPointerCapture?.(e.pointerId);
      hidePlaceholder();
      applyTool();
      const p = getPoint(canvas, e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    function pointerMove(e){
      if(!drawing) return;
      applyTool();
      const p = getPoint(canvas, e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    function pointerUp(e){
      drawing = false;
      ctx.closePath();
    }

    canvas.addEventListener('pointerdown', pointerDown);
    canvas.addEventListener('pointermove', pointerMove);
    canvas.addEventListener('pointerup', pointerUp);
    canvas.addEventListener('pointercancel', pointerUp);
    canvas.addEventListener('pointerleave', pointerUp);

    function clear(){
      // Clear in device space
      ctx.save();
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,canvas.width, canvas.height);
      ctx.restore();
      showPlaceholder();
    }

    function setTool(nextTool){
      tool = nextTool;
      applyTool();
    }

    function hasInk(){
      try{
        const img = ctx.getImageData(0,0,canvas.width, canvas.height).data;
        for(let i=3;i<img.length;i+=4){
          if(img[i] !== 0) return true;
        }
      }catch(e){}
      return false;
    }

    return {
      key: areaKey,
      canvas,
      get ctx(){ return ctx; },
      refreshCtx(){ ctx = resizeCanvas(canvas); applyTool(); },
      clear,
      setTool,
      hasInk,
      showPlaceholder,
      hidePlaceholder
    };
  }

  const areas = {
    calc: setupHandwriteArea('calc', 'calcCanvas', 'calcPlaceholder'),
    answer: setupHandwriteArea('answer', 'answerCanvas', 'answerPlaceholder')
  };

  // Tool button handling
  function setActiveButton(targetKey, tool){
    const btns = document.querySelectorAll(`[data-target="${targetKey}"][data-tool]`);
    btns.forEach(b => {
      const isActive = b.getAttribute('data-tool') === tool;
      if(isActive){
        b.classList.add('tool-active');
      } else {
        b.classList.remove('tool-active');
      }
    });
  }

  document.querySelectorAll('[data-tool][data-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.getAttribute('data-target');
      const tool = btn.getAttribute('data-tool');
      const area = areas[target];
      if(!area) return;

      if(tool === 'clear'){
        area.clear();
        return;
      }
      area.setTool(tool);
      setActiveButton(target, tool);
    });
  });

  // Initial active states
  setActiveButton('calc','pen');
  setActiveButton('answer','pen');

  // Resize observer for responsiveness
  const ro = new ResizeObserver(() => {
    Object.values(areas).forEach(a => {
      if(!a) return;
      a.refreshCtx();
      // If there's no ink after resize, show placeholder
      if(!a.hasInk()) a.showPlaceholder();
    });
  });
  Object.values(areas).forEach(a => a && ro.observe(a.canvas));

  // Navigation
  const gradeBtn = document.getElementById('gradeBtn');
  if(gradeBtn){
    gradeBtn.addEventListener('click', () => {
      window.location.href = 'SCR-10-01.html';
    });
  }

  const closeBtn = document.getElementById('closeBtn');
  if(closeBtn){
    closeBtn.addEventListener('click', () => {
      window.location.href = 'SCR-11-01.html';
    });
  }

  // OCR (mock)
  const ocrBtns = document.querySelectorAll('.ocr-trigger');
  const ocrResultText = document.getElementById('ocrResultText');
  if(ocrBtns.length && ocrResultText){
    ocrBtns.forEach(ocrBtn => ocrBtn.addEventListener('click', () => {
      ocrResultText.className = 'text-base font-bold text-gray-800 dark:text-white tracking-tight math-text';
      ocrResultText.innerHTML = '(5<span class="math-var">a</span> + 6<span class="math-var">b</span>)(5<span class="math-var">a</span> - 6<span class="math-var">b</span>)';
    }));
  }
})();
</script>
