<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Math Review Drill - Descriptive</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "primary-dark": "#0f5bbd",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e293b",
                        "text-main": "#0d131b",
                        "text-sub": "#4c6c9a",
                        "input-border": "#cfd9e7",
                        "input-bg": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans JP", "sans-serif"],
                        "body": ["Noto Sans JP", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(19, 109, 236, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        /* Hide scrollbar for horizontal scrolling areas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Custom Input Styles */
        textarea:focus {
            box-shadow: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-main dark:text-gray-100 font-display transition-colors duration-200 antialiased h-screen overflow-hidden selection:bg-primary/20 selection:text-primary">
<!-- Mobile Container -->
<div class="flex flex-col h-full max-w-md mx-auto bg-background-light dark:bg-background-dark relative shadow-2xl">
<!-- Header Section -->
<header class="flex-none bg-surface-light dark:bg-surface-dark px-4 pt-4 pb-2 flex items-center justify-between z-30 border-b border-gray-100 dark:border-gray-800/50">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-text-main dark:text-white transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-base font-bold text-center flex-1 truncate px-2 dark:text-white tracking-tight">２次方程式の利用</h1>
<button class="h-10 px-2 flex items-center justify-center rounded-lg text-primary font-bold text-sm tracking-wide hover:bg-primary/5 transition-colors">
                中断
            </button>
</header>
<!-- Progress Bar Section -->
<div class="flex-none bg-surface-light dark:bg-surface-dark px-5 pb-4 pt-1 border-b border-gray-200 dark:border-gray-800 shadow-soft z-20">
<div class="flex justify-between items-end mb-2">
<div class="flex items-center gap-2">
<span class="bg-primary text-white text-xs font-bold px-2 py-0.5 rounded-full">Q.3</span>
<span class="text-xs font-bold text-text-sub dark:text-gray-400 tracking-wide">記述問題</span>
</div>
<span class="text-sm font-medium text-text-main dark:text-gray-300 font-display">3 <span class="text-text-sub text-xs">/ 10</span></span>
</div>
<div class="h-1.5 w-full bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[30%] rounded-full shadow-[0_0_10px_rgba(19,109,236,0.5)] transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Scrollable Content Area -->
<main class="flex-1 overflow-y-auto overflow-x-hidden p-5 space-y-6 pb-4 scroll-smooth">
<!-- Question Card -->
<section class="bg-surface-light dark:bg-surface-dark rounded-xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 relative overflow-hidden group">
<!-- Decorative background blob -->
<div class="absolute -right-10 -top-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl group-hover:bg-primary/10 transition-all duration-700"></div>
<p class="text-lg leading-loose font-medium text-gray-800 dark:text-gray-100 relative z-10">
                    連続する2つの正の整数があり、それぞれの2乗の和が85になるとき、これら2つの整数を求めなさい。
                </p>
<div class="mt-4 flex gap-2">
<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-gray-50 dark:bg-gray-800 text-xs text-text-sub border border-gray-100 dark:border-gray-700">
<span class="material-symbols-outlined text-[14px]">calculate</span>
                        方程式
                    </span>
<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-gray-50 dark:bg-gray-800 text-xs text-text-sub border border-gray-100 dark:border-gray-700">
<span class="material-symbols-outlined text-[14px]">school</span>
                        中3数学
                    </span>
</div>
</section>
<!-- Input Area Label -->
<div class="flex justify-between items-center px-1">
<label class="text-sm font-bold text-gray-700 dark:text-gray-300 flex items-center gap-2">
<span class="w-1 h-4 bg-primary rounded-full"></span>
                    解答・解説を入力
                </label>
<button class="text-xs text-primary dark:text-blue-400 flex items-center gap-1 font-bold hover:underline decoration-primary/30 underline-offset-4">
<span class="material-symbols-outlined text-[16px]">lightbulb</span>
                    ヒント
                </button>
</div>
<!-- Text Area Container -->
<div class="relative">
<textarea class="w-full min-h-[320px] bg-surface-light dark:bg-surface-dark border border-input-border dark:border-gray-700 rounded-xl p-4 text-base focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all resize-none placeholder-gray-400 dark:placeholder-gray-600 text-gray-800 dark:text-gray-100 leading-relaxed font-body" placeholder="ここに解答や途中式を入力してください...

例：
小さい方の整数を x とすると、
大きい方の整数は x + 1 と表せる。"></textarea>
<!-- Character count or status could go here -->
<div class="absolute bottom-4 right-4 pointer-events-none opacity-50">
<span class="material-symbols-outlined text-gray-400 dark:text-gray-600">edit_note</span>
</div>
</div>
<!-- Spacer for bottom fixed elements -->
<div class="h-12"></div>
</main>
<!-- Sticky Bottom Area (Toolbar + Footer) -->
<div class="flex-none bg-surface-light/95 dark:bg-surface-dark/95 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 z-40 pb-safe">
<!-- Helper Toolbar (Input Accessory) -->
<div class="flex items-center gap-2 px-4 py-3 overflow-x-auto no-scrollbar border-b border-gray-100 dark:border-gray-700/50 bg-gray-50/50 dark:bg-gray-800/30">
<!-- Math Symbols Group -->
<div class="flex gap-2 shrink-0">
<button class="h-9 min-w-[2.75rem] px-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm active:scale-95 hover:border-primary/50 text-gray-700 dark:text-gray-200 font-display font-medium text-lg flex items-center justify-center transition-all">
                        x²
                    </button>
<button class="h-9 min-w-[2.75rem] px-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm active:scale-95 hover:border-primary/50 text-gray-700 dark:text-gray-200 font-display font-medium text-lg flex items-center justify-center transition-all">
                        √
                    </button>
<button class="h-9 min-w-[2.75rem] px-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm active:scale-95 hover:border-primary/50 text-gray-700 dark:text-gray-200 font-display font-medium text-lg flex items-center justify-center transition-all">
                        π
                    </button>
</div>
<div class="w-px h-6 bg-gray-300 dark:bg-gray-600 mx-1 shrink-0"></div>
<!-- Units Group -->
<div class="flex gap-2 shrink-0">
<button class="h-9 px-3 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm active:scale-95 hover:border-primary/50 text-gray-700 dark:text-gray-200 font-display font-medium text-sm flex items-center justify-center transition-all">
                        cm²
                    </button>
<button class="h-9 px-3 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm active:scale-95 hover:border-primary/50 text-gray-700 dark:text-gray-200 font-display font-medium text-sm flex items-center justify-center transition-all">
                        度
                    </button>
<button class="h-9 px-3 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm active:scale-95 hover:border-primary/50 text-gray-700 dark:text-gray-200 font-display font-medium text-sm flex items-center justify-center transition-all">
                        =
                    </button>
</div>
<div class="w-px h-6 bg-gray-300 dark:bg-gray-600 mx-1 shrink-0"></div>
<!-- Cursor Controls -->
<div class="flex gap-2 shrink-0">
<button class="h-9 w-10 bg-gray-100 dark:bg-gray-600 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-500 text-gray-600 dark:text-gray-200 flex items-center justify-center transition-colors active:bg-gray-300">
<span class="material-symbols-outlined text-sm">arrow_back</span>
</button>
<button class="h-9 w-10 bg-gray-100 dark:bg-gray-600 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-500 text-gray-600 dark:text-gray-200 flex items-center justify-center transition-colors active:bg-gray-300">
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
<!-- Main CTA Footer -->
<div class="p-4 pt-3">
<button class="w-full bg-primary hover:bg-primary-dark text-white font-bold text-lg h-14 rounded-xl shadow-glow active:scale-[0.98] transition-all flex items-center justify-center gap-3 group relative overflow-hidden">
<span class="relative z-10 tracking-wide">回答を確認する</span>
<span class="material-symbols-outlined relative z-10 group-hover:translate-x-1 transition-transform">check_circle</span>
<!-- Shine effect on hover -->
<div class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/10 to-transparent z-0"></div>
</button>
</div>
</div>
</div>
</body></html>
