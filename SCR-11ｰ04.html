<!DOCTYPE html>
<html class="light" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学・復習ドリル（因数分解 採点結果5）</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#1366ec",
          "background-light": "#f2f5f9",
          "background-dark": "#101923",
        },
        fontFamily: {
          display: ["Lexend", "Noto Sans JP", "sans-serif"],
          math: ["'Times New Roman'", "Times", "serif"], // ここを追加
        },
        borderRadius: {
          DEFAULT: "0.25rem",
          lg: "0.5rem",
          xl: "0.75rem",
          full: "9999px",
        },
      },
    },
  };
  </script>

  <style type="text/tailwindcss">
    .no-scrollbar::-webkit-scrollbar{display:none;}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}

    /* 数式全体：太字のTimes New Roman、基本は直立 */
    .math-text {
      font-family: "Times New Roman", Times, serif !important;
      font-weight: 700 !important;
      font-style: normal !important;
    }
    
    /* 変数のみを斜体にする */
    .var {
      font-style: italic;
    }

    /* 手書き表示スタイル */
    .canvas-grid{
      background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .dark .canvas-grid{
      background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px);
    }
    .handwritten-answer{
      font-family: 'Lexend', cursive;
      font-style: italic;
      color: #334155;
      filter: blur(0.2px);
    }
    .handwritten-math {
  font-family: "Times New Roman", Times, serif !important;
  font-style: normal !important; /* 全体は直立 */
  font-weight: 700;
}

/* 手書きエリアの変数だけ斜体 */
.handwritten-math .var {
  font-style: italic !important;
}
    .batsu-mark{
      position: relative;
      width: 220px;
      height: 220px;
      opacity: 0.85;
    }
    .batsu-mark::before,
    .batsu-mark::after{
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 260px;
      height: 16px;
      background: #ef4444;
      border-radius: 9999px;
      transform-origin: center;
      box-shadow: 0 0 0 2px rgba(239,68,68,0.05);
    }
    .batsu-mark::before{
      transform: translate(-50%, -50%) rotate(45deg);
    }
    .batsu-mark::after{
      transform: translate(-50%, -50%) rotate(-45deg);
    }
  </style>

  <style>
    body{min-height:max(884px, 100dvh);}
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-[#0d131b] dark:text-slate-100 flex flex-col min-h-screen">

  <header class="fixed top-0 left-0 right-0 z-50 bg-white/95 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
    <div class="flex items-center justify-between px-6 py-3 max-w-6xl mx-auto w-full">
      <button type="button" class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="back">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>

      <div class="text-center">
        <h1 class="text-base font-bold">因数分解</h1>
        <p class="text-[11px] text-gray-500 font-medium">第 5 問 / 全 10 問</p>
      </div>

      <button type="button" class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800">
      <div class="bg-primary h-full w-[50%] transition-all duration-500"></div>
    </div>
  </header>

  <main class="flex-1 w-full max-w-5xl mx-auto p-6 space-y-6 pt-24 overflow-y-auto no-scrollbar">

    <section class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-8 shadow-sm relative overflow-hidden">
      <div class="flex justify-between items-start mb-6 gap-4">
        <div>
          <p class="text-xs font-bold text-gray-400 mb-2">問題</p>
          <p class="text-gray-500 dark:text-gray-400 text-lg text-left">次の式を因数分解しなさい。</p>
        </div>
        <div class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-6 py-3 rounded-xl text-xl md:text-2xl font-bold tracking-tight border border-gray-200 dark:border-gray-700 shadow-sm whitespace-nowrap">
          難易度 70PT
        </div>
      </div>

      <div class="text-center py-6">
  <span class="text-4xl md:text-6xl tracking-tighter text-gray-800 dark:text-white math-text">
    <span class="var">x</span><sup class="text-3xl md:text-4xl">2</sup> − 4
  </span>
</div>
    </section>

    <section class="space-y-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-gray-400">edit_note</span>
          <h3 class="text-sm font-bold text-gray-600 dark:text-gray-300">あなたの解答</h3>
        </div>

        <div class="flex items-center gap-1.5 text-sm font-bold text-red-500">
          <span class="material-symbols-outlined">cancel</span>
          不正解
        </div>
      </div>

      <div class="w-full h-48 md:h-56 bg-white dark:bg-gray-900 rounded-xl border-2 border-primary/30 dark:border-primary/50 relative overflow-hidden shadow-inner">
        <div class="absolute inset-0 canvas-grid opacity-30 dark:opacity-10"></div>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="handwritten-math text-5xl md:text-6xl tracking-tight select-none">
  (
  <span class="var">x</span> + 2
  )
  (
  <span class="var">x</span> − 2
  )
</div>

        </div>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="batsu-mark"></div>
        </div>
      </div>
    </section>

    <section class="bg-blue-50/60 dark:bg-gray-800/40 rounded-2xl p-6 border border-blue-100 dark:border-gray-800">
      <div class="flex items-center gap-2 mb-6">
        <span class="bg-primary text-white text-[10px] font-bold px-2 py-0.5 rounded">解答</span>
        <span class="text-xl font-bold math-text text-gray-800 dark:text-white">(x + 2)(x − 2)</span>
      </div>

      <div class="space-y-6 text-sm leading-relaxed text-gray-600 dark:text-gray-300">
        <div>
          <p class="font-bold text-gray-800 dark:text-gray-100 mb-1">ステップ1：公式の確認</p>
          <p class="pl-4 border-l-2 border-gray-200 dark:border-gray-700">
            公式 <span class="math-text italic text-primary">x² − a² = (x + a)(x − a)</span> を利用します。
          </p>
        </div>

        <div>
          <p class="font-bold text-gray-800 dark:text-gray-100 mb-1">ステップ2：式の変形</p>
          <p class="pl-4 border-l-2 border-gray-200 dark:border-gray-700">
            4 は 2² であるため、式を次のように変形できます。
          </p>
          <div class="mt-3 ml-4 p-4 bg-white/50 dark:bg-gray-900/50 rounded-xl border border-blue-100 dark:border-gray-700 math-text">
             <div class="flex items-center gap-2">
               <span class="text-gray-400">=</span>
               <span>x² − 2²</span>
             </div>
             <div class="flex items-center gap-2 font-bold text-gray-800 dark:text-white mt-1">
               <span class="text-gray-400">=</span>
               <span>(x + 2)(x − 2)</span>
             </div>
          </div>
        </div>
      </div>
    </section>

    <div class="h-24"></div>
  </main>

  <footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 z-30">
    <div class="max-w-5xl mx-auto">
      <a href="SCR-09-03.html" class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/30 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-2xl">arrow_back</span>
        前の問題へ
</a>
    </div>
  </footer>
</body>
</html>
