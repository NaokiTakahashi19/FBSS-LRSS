<!DOCTYPE html>
<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>数学・復習ドリル（自己採点 第10問）スタイル統一版</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans JP", "sans-serif"],
                        "body": ["Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .math-text {
  font-family: "Times New Roman", Times, serif;
  font-style: normal;   /* 数字・記号は直立 */
}

/* 変数だけ斜体 */
.var {
  font-style: italic;
}
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }
        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            font-size: 0.9em;
            line-height: 1;
            margin: 0 0.1em;
        }
        .fraction .num {
            border-bottom: 1px solid currentColor;
            padding-bottom: 1px;
        }
        .fraction .den {
            padding-top: 1px;
        }
        /* ===== ルート記号（√）専用 ===== */
.radical {
  display: inline-flex;
  align-items: flex-start;
  font-family: "Times New Roman", Times, serif;
}

.radical::before {
  content: "√";
  margin-right: 2px;
}

.radicand {
  border-top: 1.5px solid currentColor;
  padding: 0 2px;
  line-height: 1;
}
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
    /* 問題の数式だけ太字 */
.problem-text {
  font-weight: 600; /* 太すぎない数学向け */
}
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex flex-col h-screen overflow-hidden antialiased selection:bg-primary/30 selection:text-primary">
<header class="flex-none bg-white dark:bg-slate-900 z-20 shadow-sm">
<header class="flex-none bg-white dark:bg-slate-900 z-20 shadow-sm">
  <div class="relative flex items-center px-4 py-3">

    <!-- ← ボタン（左固定） -->
    <button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300">
      <span class="text-2xl font-medium leading-none">←</span>
    </button>

    <!-- 中央タイトル（absoluteで中央固定） -->
    <div class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center text-center">
      <h2 class="text-base font-bold text-slate-900 dark:text-white tracking-tight">
        数学・総合演習
      </h2>
      <span class="text-xs text-slate-500 dark:text-slate-400 font-medium">
        第10問 / 全10問
      </span>
    </div>

    <!-- ×ボタンは削除 -->
  </div>

  <!-- 進捗バーはそのまま -->
  <div class="px-0 w-full">
    <div class="h-1 w-full bg-slate-100 dark:bg-slate-800">
      <div class="h-full bg-primary" style="width: 100%;"></div>
    </div>
  </div>
</header>
<main class="flex-1 overflow-y-auto no-scrollbar relative w-full max-w-4xl mx-auto flex flex-col p-4 md:p-6">
<div class="flex flex-col gap-6 h-full">
<section class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 flex-1 overflow-hidden p-8 md:p-12">
<div class="mb-8">
<h1 class="text-xl md:text-2xl font-bold text-slate-800 dark:text-white mb-2">1 次の(1)〜(6)の問いに答えなさい。</h1>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10 math-text text-lg md:text-xl text-slate-700 dark:text-slate-200">
<div class="flex items-start gap-3">
<span class="font-medium min-w-[32px]">(1)</span>
<div class="flex flex-wrap items-baseline gap-1">
  <span class="problem-text">− 2 + 9</span>
  <span class="text-[#000000] dark:text-white text-sm ml-2 font-normal">
    を計算しなさい。
  </span>
</div>
</div>
<div class="flex items-start gap-3">
  <span class="font-medium min-w-[32px]">(2)</span>
  <div class="flex flex-wrap items-center gap-1">
    <span class="problem-text">
      − 5<sup>2</sup> + 18 ÷
    </span>

    <div class="fraction math-text problem-text">
      <span class="num">3</span>
      <span class="den">2</span>
    </div>
</div>
<span class="text-[#000000] dark:text-white text-sm ml-2 font-normal">を計算しなさい。</span>
</div>
<div class="flex items-start gap-3">
<span class="font-medium min-w-[32px]">(3)</span>
<div class="flex flex-wrap items-center gap-1">
  <span class="math-text problem-text">
    2 ( <span class="var">x</span> + 4<span class="var">y</span> ) − 3 (
  </span>

  <div class="fraction problem-text">
    <span class="num">1</span>
    <span class="den">2</span>
  </div>

  <span class="problem-text">
    <span class="var">x</span> −
  </span>

  <div class="fraction problem-text">
    <span class="num">1</span>
    <span class="den">3</span>
  </div>

  <span class="problem-text">
    <span class="var">y</span> )
  </span>

  <span class="text-[#000000] dark:text-white text-sm ml-2 font-normal">
    を計算しなさい。
  </span>
</div>
</div>
<div class="flex items-start gap-3">
<span class="font-medium min-w-[32px]">(4)</span>
<div class="flex flex-wrap items-center gap-1">
  <span class="text-[#000000] dark:text-white text-sm font-normal mr-1">
    方程式
  </span>

  <span class="problem-text">
    <span class="var">x</span> − 7 =
  </span>

  <div class="fraction problem-text">
    <span class="num">4<span class="var">x</span> − 9</span>
    <span class="den">3</span>
  </div>

  <span class="text-[#000000] dark:text-white text-sm ml-2 font-normal">
    を解きなさい。
  </span>
</div>
</div>
<div class="flex items-start gap-3">
<span class="font-medium min-w-[32px]">(5)</span>
<div class="flex flex-wrap items-center gap-1">
  <span class="math-text problem-text">
    <span class="radical"><span class="radicand">50</span></span>
    + 6
    <span class="radical"><span class="radicand">2</span></span>
    −
  </span>

  <div class="fraction math-text problem-text">
    <span class="num">14</span>
    <span class="den">
      <span class="radical"><span class="radicand">2</span></span>
    </span>
  </div>

  <span class="text-[#000000] dark:text-white text-sm ml-2 font-normal">
    を計算しなさい。
  </span>
</div>
</div>
<div class="flex items-start gap-3">
<span class="font-medium min-w-[32px]">(6)</span>
<div class="flex flex-wrap items-baseline gap-1">
  <span class="problem-text">
    2<span class="var">x</span><sup>2</sup> − 32
  </span>
  <span class="text-[#000000] dark:text-white text-sm ml-2 font-normal">
    を因数分解しなさい。
  </span>
</div>
</div>
</div>
</section>
<div class="flex items-center justify-center py-2">
<div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 bg-white/50 dark:bg-slate-800/50 px-6 py-3 rounded-full border border-slate-200 dark:border-slate-800">
<span class="material-symbols-outlined text-lg">info</span>
<p class="text-sm font-medium">問題はノートに解いて、終わったら「答え合わせ」をしましょう。</p>
</div>
</div>
<div class="h-24"></div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 p-4 pb-8 sm:pb-4 z-30">
<div class="max-w-2xl mx-auto">
<!-- 答え合わせ：SCR-13.html へ遷移 -->
<a href="SCR-13.html" class="w-full h-16 rounded-2xl bg-primary hover:bg-blue-600 text-white font-bold text-xl shadow-xl shadow-blue-500/30 active:translate-y-0.5 transition-all flex items-center justify-center gap-2">
  <span class="material-symbols-outlined">task_alt</span>
  <span>答え合わせ</span>
</a>
</div>
</footer>
</body></html>
