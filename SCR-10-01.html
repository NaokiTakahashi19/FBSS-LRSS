<!DOCTYPE html>
<html class="light" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学・復習ドリル（因数分解 採点結果）</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#1366ec",
            "background-light": "#f2f5f9",
            "background-dark": "#101923",
          },
          fontFamily: {
            display: ["Lexend", "Noto Sans JP", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>

  <style type="text/tailwindcss">
    .no-scrollbar::-webkit-scrollbar{display:none;}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
    .math-text{
  font-family: "Times New Roman", Times, serif;
  font-style: normal;   /* ★ 全体は斜体にしない */
}
.math-text .var{
  font-style: italic;  /* ★ 変数だけ斜体 */
}

    /* 手書きっぽい表示(デモ) */
    .canvas-grid{
      background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .dark .canvas-grid{
      background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px);
    }
    .handwritten-answer{
  /* font-family: 'Lexend', cursive; ← これを削除 or コメントアウト */
  font-style: normal;   /* 斜体は var に任せる */
  font-weight: 700; 
  color: #334155;
  filter: blur(0.2px);
}
    .maru-mark{
      border: 8px solid #ef4444;
      border-radius: 50%;
      width: 180px;
      height: 180px;
      opacity: 0.8;
      transform: rotate(-10deg);
    }
  </style>

  <style>
    body{min-height:max(884px, 100dvh);}
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-[#0d131b] dark:text-slate-100 flex flex-col min-h-screen">

  <!-- Header: SCR-09-01.html と同じ構造 -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/95 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
    <div class="flex items-center justify-between px-6 py-3 max-w-6xl mx-auto w-full">
      <button type="button" class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="back">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>

      <div class="text-center">
        <h1 class="text-base font-bold">因数分解</h1>
        <p class="text-[11px] text-gray-500 font-medium">第 2 問 / 全 10 問</p>
      </div>

      <button id="closeBtn" type="button" class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800">
      <div class="bg-primary h-full w-[20%] transition-all duration-500"></div>
    </div>
  </header>

  <main class="flex-1 w-full max-w-5xl mx-auto p-6 space-y-6 pt-24 overflow-y-auto no-scrollbar">

    <!-- 問題カード(見た目は SCR-09-01.html に準拠) -->
    <section class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-8 shadow-sm relative overflow-hidden">
      <div class="flex justify-between items-start mb-6 gap-4">
        <div>
          <p class="text-xs font-bold text-gray-400 mb-2">問題</p>
          <p class="text-gray-500 dark:text-gray-400 text-lg text-left">次の式を因数分解しなさい。</p>
        </div>
        <div class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-6 py-3 rounded-xl text-xl md:text-2xl font-bold tracking-tight border border-gray-200 dark:border-gray-700 shadow-sm whitespace-nowrap">
          難易度 67PT
        </div>
      </div>

      <div class="text-center py-6">
        <span class="text-5xl md:text-6xl font-bold tracking-tighter text-gray-800 dark:text-white math-text">
  <span class="var">a</span><span class="var">b</span> + <span class="var">b</span><span class="var">c</span>
</span>
      </div>
    </section>

    <!-- 採点結果(雰囲気は SCR-09-01.html のカード/余白に合わせる) -->
    <section class="space-y-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-gray-400">edit_note</span>
          <h3 class="text-sm font-bold text-gray-600 dark:text-gray-300">あなたの解答</h3>
        </div>

        <div class="flex items-center gap-1.5 text-sm font-bold text-red-500">
          <span class="material-symbols-outlined">check_circle</span>
          正解！
        </div>
      </div>

      <div class="w-full h-48 md:h-56 bg-white dark:bg-gray-900 rounded-xl border-2 border-primary/30 dark:border-primary/50 relative overflow-hidden shadow-inner">
        <div class="absolute inset-0 canvas-grid opacity-30 dark:opacity-10"></div>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="handwritten-answer text-6xl tracking-tighter select-none math-text">
  <span class="var">b</span>(
  <span class="var">a</span> + <span class="var">c</span>)
</div>
        </div>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="maru-mark"></div>
        </div>

        <div class="absolute bottom-3 right-3 opacity-10 dark:opacity-20">
          <span class="material-symbols-outlined text-4xl text-slate-400">gesture</span>
        </div>
      </div>
    </section>

    <!-- 解答/解説カード -->
    <section class="bg-blue-50/60 dark:bg-gray-800/40 rounded-2xl p-6 border border-blue-100 dark:border-gray-800">
      <div class="flex items-center gap-2 mb-4">
        <span class="bg-primary text-white text-[10px] font-bold px-2 py-0.5 rounded">解答</span>
        <span class="text-lg font-bold math-text text-gray-800 dark:text-white">b(a + c)</span>
      </div>

      <div class="space-y-4 text-sm leading-relaxed text-gray-600 dark:text-gray-300">
        <div>
          <p class="font-bold text-gray-800 dark:text-gray-100 mb-1">ステップ1：因数にわける</p>
          <p class="math-text pl-4 border-l-2 border-gray-200 dark:border-gray-700">= <span class="italic">a × b + b × c</span></p>
        </div>
        <div>
          <p class="font-bold text-gray-800 dark:text-gray-100 mb-1">ステップ2：共通な因数をくくり出す</p>
          <p class="math-text pl-4 ...">
  = <span class="var">a</span> × <span class="var">b</span> + <span class="var">b</span> × <span class="var">c</span>
</p>
        </div>
      </div>
    </section>

    <!-- 余白（固定フッター分） -->
    <div class="h-24"></div>
  </main>

  <!-- Footer: SCR-09-01.と同じ固定フッター -->
  <footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 z-30">
    <div class="max-w-5xl mx-auto">
      <a href="SCR-09-02.html" class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/30 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        次の問題へ
        <span class="material-symbols-outlined text-2xl">arrow_forward</span>
      </a>
    </div>
  </footer>

  <script>
    // closeボタンは必要に応じてリンク先を設定してください
    // 例: document.getElementById('closeBtn').onclick = () => location.href = 'SCR-11-01.html';
  </script>
</body>
</html>
