<!DOCTYPE html>
<html class="light" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学・復習ドリル（因数分解 採点結果）</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script src="data/math-questions-3-a-02.js"></script>

  <style>
    :root{
      --primary:#3f8f76;
      --primary-dark:#2f735e;
      --bg:#edf2df;
      --paper:#fffffb;
      --line:rgba(63,143,118,.2);
      --text:#23332f;
      --muted:#6d7a74;
      --soft:#f5faf2;
      --orange:#d99a28;
      --danger:#ef4444;
      --shadow:0 14px 28px rgba(71,91,82,.09);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100dvh;
      background:var(--bg);
      color:var(--text);
      font-family:"Lexend","Noto Sans JP",sans-serif;
      letter-spacing:0;
      overflow-x:hidden;
    }
    button,a{font:inherit;}
    .material-symbols-outlined{
      font-variation-settings:'FILL' 0,'wght' 600,'GRAD' 0,'opsz' 24;
      line-height:1;
      vertical-align:middle;
    }
    .result-header{
      position:fixed;
      inset:0 0 auto 0;
      z-index:50;
      background:rgba(255,255,251,.96);
      border-bottom:1px solid rgba(63,143,118,.18);
      backdrop-filter:blur(12px);
    }
    .header-inner{
      width:min(1180px,100%);
      margin:0 auto;
      padding:12px 24px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .icon-button{
      width:42px;
      height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:0;
      border-radius:999px;
      background:transparent;
      color:#1f2d29;
      cursor:pointer;
      transition:background .18s ease, transform .18s ease;
    }
    .icon-button:hover{background:rgba(63,143,118,.1);}
    .icon-button:active{transform:scale(.96);}
    .title-block{text-align:center;}
    .title-block h1{
      margin:0;
      font-size:16px;
      font-weight:700;
      line-height:1.25;
    }
    .title-block p{
      margin:3px 0 0;
      font-size:11px;
      font-weight:600;
      color:#66756f;
    }
    .footprint-wrap{
      margin-top:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
    }
    .footprints{
      display:flex;
      align-items:center;
      gap:4px;
    }
    .footprint-dot{
      width:8px;
      height:8px;
      border:1px solid rgba(63,143,118,.18);
      border-radius:999px;
      background:rgba(63,143,118,.14);
    }
    .footprint-dot.done,
    .footprint-dot.correct{
      border-color:var(--primary);
      background:var(--primary);
    }
    .footprint-dot.current{
      border-color:#d99a28;
      background:#d99a28;
      box-shadow:0 0 0 3px rgba(217,154,40,.15);
    }
    .footprint-dot.incorrect{
      border-color:var(--orange);
      background:var(--orange);
      box-shadow:0 0 0 3px rgba(217,154,40,.16);
    }
    .progress-track{
      width:100%;
      height:5px;
      background:rgba(63,143,118,.1);
    }
    .progress-bar{
      display:block;
      height:100%;
      width:10%;
      background:var(--primary);
      transition:width .34s ease;
    }
    .page{
      width:min(1180px,100%);
      margin:0 auto;
      padding:104px 24px 104px;
      opacity:0;
      transform:translateY(8px);
      transition:opacity .26s ease, transform .26s ease;
    }
    body.is-ready .page{opacity:1;transform:none;}
    body.is-leaving .page{opacity:0;transform:translateY(-4px);}
    .result-grid{
      display:grid;
      gap:18px;
      grid-template-columns:1fr;
      grid-template-areas:
        "problem"
        "answer"
        "explain";
    }
    .card{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      transition:opacity .24s ease, transform .24s ease, box-shadow .24s ease;
    }
    body.is-ready .problem-card{animation:cardInLeft .34s cubic-bezier(.2,.75,.2,1) both;}
    body.is-ready .answer-card{animation:cardInRight .34s cubic-bezier(.2,.75,.2,1) .04s both;}
    body.is-ready .explain-card{animation:cardInUp .34s cubic-bezier(.2,.75,.2,1) .08s both;}
    body.is-leaving .problem-card{opacity:0;transform:translateX(-18px) scale(.99);}
    body.is-leaving .answer-card{opacity:0;transform:translateX(18px) scale(.99);}
    body.is-leaving .explain-card{opacity:0;transform:translateY(16px) scale(.99);}
    @keyframes cardInLeft{
      from{opacity:0;transform:translateX(-18px) scale(.99);}
      to{opacity:1;transform:none;}
    }
    @keyframes cardInRight{
      from{opacity:0;transform:translateX(18px) scale(.99);}
      to{opacity:1;transform:none;}
    }
    @keyframes cardInUp{
      from{opacity:0;transform:translateY(16px) scale(.99);}
      to{opacity:1;transform:none;}
    }
    @keyframes celebrationIn{
      to{opacity:1;transform:none;}
    }
    @keyframes shineSweep{
      to{transform:rotate(18deg) translateX(260%);}
    }
    @keyframes stampMaru{
      0%{opacity:0;transform:translate(-50%,-50%) rotate(-16deg) scale(.35);}
      56%{opacity:1;transform:translate(-50%,-50%) rotate(-9deg) scale(1.16);}
      74%{opacity:1;transform:translate(-50%,-50%) rotate(-9deg) scale(.94);}
      to{opacity:1;transform:translate(-50%,-50%) rotate(-9deg) scale(1);}
    }
    @keyframes stampHalo{
      0%{opacity:.72;transform:scale(.82);}
      to{opacity:0;transform:scale(1.32);}
    }
    @keyframes stampWord{
      0%{opacity:0;transform:translateX(-50%) rotate(9deg) scale(.64);}
      72%{opacity:1;transform:translateX(-50%) rotate(9deg) scale(1.12);}
      to{opacity:1;transform:translateX(-50%) rotate(9deg) scale(1);}
    }
    @keyframes batsuStamp{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.44);}
      58%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}
      76%{opacity:1;transform:translate(-50%,-50%) scale(.96);}
      to{opacity:1;transform:translate(-50%,-50%) scale(1);}
    }
    @keyframes batsuStrokeA{
      0%{opacity:0;transform:translate(-50%,-50%) rotate(45deg) scaleX(.12);}
      to{opacity:1;transform:translate(-50%,-50%) rotate(45deg) scaleX(1);}
    }
    @keyframes batsuStrokeB{
      0%{opacity:0;transform:translate(-50%,-50%) rotate(-45deg) scaleX(.12);}
      to{opacity:1;transform:translate(-50%,-50%) rotate(-45deg) scaleX(1);}
    }
    @keyframes batsuWord{
      0%{opacity:0;transform:translateX(-50%) rotate(-7deg) scale(.72);}
      70%{opacity:1;transform:translateX(-50%) rotate(-7deg) scale(1.1);}
      to{opacity:1;transform:translateX(-50%) rotate(-7deg) scale(1);}
    }
    @keyframes confettiPop{
      0%{opacity:0;transform:scale(.78) rotate(-2deg);}
      44%{opacity:1;transform:scale(1.04) rotate(1deg);}
      to{opacity:.78;transform:scale(1) rotate(0deg);}
    }
    @keyframes badgeRise{
      to{opacity:1;transform:none;}
    }
    .problem-card{
      grid-area:problem;
      min-height:330px;
      padding:26px 28px;
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .answer-card{grid-area:answer;padding:20px;}
    .explain-card{grid-area:explain;padding:24px;}
    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .problem-label-row{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:8px;
    }
    .problem-label-row .section-label{margin:0;}
    .learning-tag{
      display:inline-flex;
      align-items:center;
      gap:4px;
      border:1px solid rgba(63,143,118,.16);
      border-radius:999px;
      background:#f3faf6;
      color:var(--primary-dark);
      padding:4px 9px;
      font-size:11px;
      font-weight:700;
      line-height:1;
    }
    .learning-tag .material-symbols-outlined{
      font-size:14px;
    }
    .section-label{
      margin:0 0 8px;
      color:#8a9690;
      font-size:12px;
      font-weight:700;
    }
    .problem-prompt{
      margin:0;
      color:#111827;
      font-size:clamp(14px,1.25vw,17px);
      font-weight:500;
      line-height:1.8;
    }
    .problem-prompt strong{font-weight:700;}
    .difficulty-pill{
      flex:0 0 auto;
      border:1px solid rgba(63,143,118,.18);
      border-radius:999px;
      background:#f8fbf4;
      padding:9px 16px;
      color:#4b5c56;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }
    .formula-area{
      flex:1;
      min-height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 12px 34px;
      text-align:center;
    }
    .test-formula,
    .math-text{
      font-family:"KaTeX_Main","Latin Modern Math","STIX Two Text","Cambria Math","Times New Roman",serif;
      font-style:normal;
      font-variant-numeric:lining-nums;
      text-rendering:geometricPrecision;
      letter-spacing:0;
    }
    .test-formula{
      display:block;
      color:#111827;
      font-size:clamp(1.65rem,2.55vw,2.15rem);
      font-weight:500;
      line-height:1.5;
      word-spacing:.08em;
      overflow-wrap:anywhere;
    }
    .math-var,
    .test-formula .var,
    .math-text .var{
      font-family:"KaTeX_Math","KaTeX_Main","Latin Modern Math","STIX Two Text","Cambria Math","Times New Roman",serif;
      font-style:normal;
      font-weight:400;
    }
    .test-formula sup,
    .math-text sup{
      font-size:.58em;
      line-height:0;
      margin-left:.02em;
    }
    .problem-meta{
      position:absolute;
      right:24px;
      bottom:18px;
      color:#8f9a95;
      font-size:12px;
      font-weight:700;
    }
    .panel-title{
      display:flex;
      align-items:center;
      gap:8px;
      margin:0;
      color:#44554f;
      font-size:15px;
      font-weight:700;
    }
    .panel-title .material-symbols-outlined{color:var(--primary);}
    .result-status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:12px;
    }
    .status-pill{
      display:inline-flex;
      align-items:center;
      gap:5px;
      border:1px solid rgba(63,143,118,.18);
      border-radius:999px;
      background:#f1faf3;
      color:var(--primary);
      padding:7px 12px;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }
    .answer-card.is-incorrect .status-pill{
      border-color:rgba(217,154,40,.3);
      background:#fff8e8;
      color:#d27722;
    }
    .answer-paper{
      position:relative;
      min-height:224px;
      overflow:hidden;
      border:2px solid rgba(63,143,118,.28);
      border-radius:16px;
      background:#fff;
      background-image:radial-gradient(rgba(63,143,118,.2) 1px, transparent 1px);
      background-size:20px 20px;
    }
    .answer-paper::before{
      content:"";
      position:absolute;
      inset:18px 18px 12px;
      z-index:1;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 28%, rgba(239,68,68,.72) 0 3px, transparent 4px),
        radial-gradient(circle at 28% 74%, rgba(217,154,40,.72) 0 3px, transparent 4px),
        radial-gradient(circle at 72% 22%, rgba(63,143,118,.7) 0 3px, transparent 4px),
        radial-gradient(circle at 82% 64%, rgba(239,68,68,.56) 0 2px, transparent 3px),
        radial-gradient(circle at 50% 18%, rgba(217,154,40,.5) 0 2px, transparent 3px),
        radial-gradient(circle at 46% 82%, rgba(63,143,118,.5) 0 2px, transparent 3px);
      opacity:0;
      transform:scale(.78);
      animation:confettiPop .72s ease .5s forwards;
    }
    .answer-card.is-incorrect .answer-paper{
      border-color:rgba(217,154,40,.34);
      background-image:radial-gradient(rgba(217,154,40,.18) 1px, transparent 1px);
    }
    .answer-card.is-incorrect .answer-paper::before{
      display:none;
    }
    .correct-celebration{
      position:relative;
      display:flex;
      align-items:center;
      gap:12px;
      overflow:hidden;
      margin:0 0 14px;
      border:1px solid rgba(63,143,118,.18);
      border-radius:14px;
      background:#f1faf3;
      padding:12px 14px;
      opacity:0;
      transform:translateY(8px);
      animation:celebrationIn .42s cubic-bezier(.2,.78,.2,1) .16s forwards;
    }
    .answer-card.is-incorrect .correct-celebration{
      border-color:rgba(217,154,40,.28);
      background:#fff8e8;
    }
    .correct-celebration::after{
      content:"";
      position:absolute;
      inset:-40% auto auto -15%;
      width:52%;
      height:180%;
      background:rgba(255,255,255,.45);
      transform:rotate(18deg) translateX(-120%);
      animation:shineSweep 1.05s ease .45s forwards;
      pointer-events:none;
    }
    .celebration-icon{
      position:relative;
      z-index:1;
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;
      height:40px;
      border-radius:999px;
      background:#fff;
      color:var(--primary);
      box-shadow:inset 0 0 0 1px rgba(63,143,118,.16);
    }
    .answer-card.is-incorrect .celebration-icon{
      color:#d27722;
      box-shadow:inset 0 0 0 1px rgba(217,154,40,.2);
    }
    .celebration-copy{
      position:relative;
      z-index:1;
      min-width:0;
    }
    .celebration-copy b{
      display:block;
      color:var(--primary-dark);
      font-size:14px;
      line-height:1.4;
    }
    .answer-card.is-incorrect .celebration-copy b{
      color:#8a561d;
    }
    .celebration-copy span{
      display:block;
      margin-top:2px;
      color:#65746f;
      font-size:12px;
      font-weight:700;
      line-height:1.45;
    }
    .answer-label{
      position:absolute;
      top:11px;
      left:12px;
      z-index:5;
      border:1px solid rgba(63,143,118,.16);
      border-radius:8px;
      background:rgba(255,255,255,.88);
      color:var(--primary);
      padding:5px 9px;
      font-size:11px;
      font-weight:700;
    }
    .answer-value{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:44px 24px 28px;
      color:#111827;
      text-align:center;
      font-size:clamp(1.55rem,2.35vw,2.2rem);
      line-height:1.5;
    }
    .answer-card.is-incorrect .answer-value{
      color:#4b3a24;
    }
    .maru-mark{
      position:absolute;
      top:50%;
      left:50%;
      z-index:3;
      width:150px;
      height:150px;
      border:8px solid rgba(239,68,68,.76);
      border-radius:999px;
      box-shadow:0 8px 20px rgba(239,68,68,.15), inset 0 0 0 2px rgba(255,255,255,.58);
      transform:translate(-50%,-50%) rotate(-16deg) scale(.35);
      opacity:0;
      animation:stampMaru .62s cubic-bezier(.16,.9,.2,1.18) .42s forwards;
      pointer-events:none;
    }
    .maru-mark::before{
      content:"";
      position:absolute;
      inset:-18px;
      border:3px solid rgba(239,68,68,.32);
      border-radius:999px;
      opacity:0;
      animation:stampHalo .72s ease .58s forwards;
    }
    .maru-mark .stamp-label{
      position:absolute;
      left:50%;
      bottom:14px;
      color:rgba(239,68,68,.78);
      font-family:"Noto Sans JP",sans-serif;
      font-size:18px;
      font-weight:900;
      letter-spacing:.08em;
      opacity:0;
      transform:translateX(-50%) rotate(9deg) scale(.64);
      animation:stampWord .42s cubic-bezier(.18,.9,.2,1.18) .66s forwards;
    }
    .batsu-mark{
      position:absolute;
      top:50%;
      left:50%;
      z-index:3;
      width:150px;
      height:150px;
      border-radius:999px;
      transform:translate(-50%,-50%) scale(.44);
      opacity:0;
      animation:batsuStamp .58s cubic-bezier(.16,.9,.2,1.16) .36s forwards;
      pointer-events:none;
    }
    .batsu-mark::before,
    .batsu-mark::after{
      content:"";
      position:absolute;
      top:50%;
      left:50%;
      width:118px;
      height:9px;
      border-radius:999px;
      background:rgba(239,68,68,.86);
      box-shadow:0 7px 18px rgba(239,68,68,.18);
      opacity:0;
      transform-origin:center;
    }
    .batsu-mark::before{
      transform:translate(-50%,-50%) rotate(45deg) scaleX(.12);
      animation:batsuStrokeA .34s cubic-bezier(.18,.9,.2,1.16) .52s forwards;
    }
    .batsu-mark::after{
      transform:translate(-50%,-50%) rotate(-45deg) scaleX(.12);
      animation:batsuStrokeB .34s cubic-bezier(.18,.9,.2,1.16) .62s forwards;
    }
    .batsu-mark .stamp-label{
      position:absolute;
      left:50%;
      bottom:12px;
      color:#dc2626;
      font-family:"Noto Sans JP",sans-serif;
      font-size:17px;
      font-weight:900;
      letter-spacing:.06em;
      opacity:0;
      transform:translateX(-50%) rotate(-7deg) scale(.72);
      animation:batsuWord .36s cubic-bezier(.18,.9,.2,1.16) .72s forwards;
    }
    .answer-badge{
      position:absolute;
      right:12px;
      bottom:12px;
      border:1px solid rgba(239,68,68,.16);
      border-radius:999px;
      background:#fff5f5;
      color:var(--danger);
      padding:7px 12px;
      font-size:12px;
      font-weight:700;
      opacity:0;
      transform:translateY(6px);
      animation:badgeRise .28s ease .62s forwards;
    }
    .answer-card.is-incorrect .answer-badge{
      border-color:rgba(217,154,40,.24);
      background:#fff8e8;
      color:#d27722;
    }
    .explain-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:16px;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      border-radius:8px;
      background:var(--primary);
      color:#fff;
      padding:5px 9px;
      font-size:11px;
      font-weight:700;
      line-height:1;
    }
    .answer-formula{
      color:#24332f;
      font-size:clamp(1.25rem,1.75vw,1.55rem);
      font-weight:500;
    }
    .explain-body{
      display:grid;
      gap:14px;
      color:#4a5b55;
      font-size:15px;
      line-height:1.9;
    }
    .explain-body p{margin:.25rem 0;}
    .explain-body strong{color:#263530;}
    .explain-intro{
      border:1px solid rgba(63,143,118,.13);
      border-radius:14px;
      background:#f8fbf4;
      padding:13px 16px;
    }
    .step-list{
      display:grid;
      gap:10px;
    }
    .step-accordion{
      overflow:hidden;
      border:1px solid rgba(63,143,118,.18);
      border-radius:14px;
      background:#fff;
      box-shadow:0 8px 18px rgba(71,91,82,.05);
    }
    .step-accordion summary{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      list-style:none;
      cursor:pointer;
      padding:14px 16px;
      color:#263530;
      font-weight:700;
      line-height:1.6;
      user-select:none;
    }
    .step-accordion summary::-webkit-details-marker{display:none;}
    .step-accordion summary:hover{
      background:#f8fbf4;
    }
    .step-chevron{
      flex:0 0 auto;
      color:var(--primary);
      font-size:13px;
      transition:transform .2s ease;
    }
    .step-accordion[open] .step-chevron{
      transform:rotate(180deg);
    }
    .step-content{
      display:grid;
      gap:12px;
      border-top:1px solid rgba(63,143,118,.12);
      background:#fffffb;
      padding:14px 16px 16px;
    }
    .explain-body .formula-block{
      border:1px solid rgba(63,143,118,.15);
      border-radius:14px;
      background:#fff;
      padding:13px 16px;
      color:#111827;
      overflow-x:auto;
    }
    .explain-body .formula-line{
      display:block;
      margin:4px 0;
      color:#111827;
      font-size:clamp(1.15rem,1.55vw,1.45rem);
      line-height:1.7;
      white-space:nowrap;
    }
    .summary-strip{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:16px;
    }
    .summary-chip{
      border:1px solid rgba(63,143,118,.15);
      border-radius:999px;
      background:#f8fbf4;
      color:#53625d;
      padding:7px 11px;
      font-size:12px;
      font-weight:700;
    }
    .footer{
      position:fixed;
      inset:auto 0 0 0;
      z-index:40;
      border-top:1px solid rgba(63,143,118,.16);
      background:rgba(255,255,251,.94);
      backdrop-filter:blur(12px);
      padding:14px 24px;
    }
    .footer-inner{
      width:min(1180px,100%);
      margin:0 auto;
      display:flex;
      justify-content:flex-end;
    }
    .primary-action{
      min-width:176px;
      min-height:52px;
      border:0;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:0 28px;
      font-size:15px;
      font-weight:700;
      text-decoration:none;
      box-shadow:0 10px 20px rgba(63,143,118,.22);
      cursor:pointer;
      transition:filter .18s ease, transform .18s ease;
    }
    .primary-action:hover{filter:brightness(1.05);}
    .primary-action:active{transform:translateY(1px) scale(.99);}
    @media (orientation:landscape) and (min-width:900px){
      .result-grid{
        grid-template-columns:minmax(0,.88fr) minmax(440px,.72fr);
        grid-template-areas:
          "problem answer"
          "explain explain";
        align-items:start;
      }
      .problem-card{min-height:354px;}
      .answer-paper{min-height:268px;}
    }
    @media (max-width:640px){
      .header-inner{padding-inline:14px;}
      .page{padding:92px 14px 104px;}
      .problem-card,.answer-card,.explain-card{padding:18px;}
      .card-head{display:block;}
      .difficulty-pill{display:inline-flex;margin-top:14px;}
      .problem-meta{position:static;margin-top:10px;text-align:right;}
      .result-status{align-items:flex-start;}
      .footer-inner{justify-content:stretch;}
      .primary-action{width:100%;}
    }
    @media (prefers-reduced-motion:reduce){
      .page,
      .card,
      .progress-bar{
        animation:none !important;
        transition:none !important;
      }
      .correct-celebration,
      .correct-celebration::after,
      .answer-paper::before,
      .maru-mark,
      .maru-mark::before,
      .maru-mark .stamp-label,
      .batsu-mark,
      .batsu-mark::before,
      .batsu-mark::after,
      .batsu-mark .stamp-label,
      .answer-badge{
        animation:none !important;
      }
      .correct-celebration,
      .answer-paper::before,
      .answer-badge{
        opacity:1 !important;
        transform:none !important;
      }
      .maru-mark,
      .maru-mark .stamp-label,
      .batsu-mark,
      .batsu-mark::before,
      .batsu-mark::after,
      .batsu-mark .stamp-label{
        opacity:1 !important;
      }
      .maru-mark::before{
        opacity:0 !important;
      }
      .maru-mark{
        transform:translate(-50%,-50%) rotate(-9deg) !important;
      }
      .maru-mark .stamp-label{
        transform:translateX(-50%) rotate(9deg) scale(1) !important;
      }
      .batsu-mark{
        transform:translate(-50%,-50%) scale(1) !important;
      }
      .batsu-mark::before{
        transform:translate(-50%,-50%) rotate(45deg) scaleX(1) !important;
      }
      .batsu-mark::after{
        transform:translate(-50%,-50%) rotate(-45deg) scaleX(1) !important;
      }
      .batsu-mark .stamp-label{
        transform:translateX(-50%) rotate(-7deg) scale(1) !important;
      }
    }
  </style>
</head>

<body>
  <header class="result-header">
    <div class="header-inner">
      <button id="backBtn" class="icon-button" type="button" aria-label="前の画面へ戻る">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <div class="title-block">
        <h1 id="unitTitle">因数分解</h1>
        <p id="questionCounter">第 1 問 / 全 10 問</p>
        <div class="footprint-wrap" aria-label="今日の足あと">
          <div class="footprints" id="footprints"></div>
        </div>
      </div>
      <button id="closeBtn" class="icon-button" type="button" aria-label="閉じる">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="progress-track"><span id="progressBar" class="progress-bar"></span></div>
  </header>

  <main class="page result-grid">
    <section class="card problem-card" aria-labelledby="problemTitle">
      <div class="card-head">
        <div>
          <div class="problem-label-row">
            <p class="section-label" id="problemTitle">問題</p>
            <span class="learning-tag">
              <span class="material-symbols-outlined">category</span>
              <span id="learningItemTag">学習項目</span>
            </span>
          </div>
          <p class="problem-prompt">
            <strong id="questionIndexLabel">【問題1】</strong>
            <span id="questionPrompt">次の式を因数分解しなさい。</span>
          </p>
        </div>
        <div class="difficulty-pill" id="difficultyLabel">難易度 180 / 300</div>
      </div>

      <div class="formula-area">
        <span class="test-formula" id="questionFormula" aria-live="polite"></span>
      </div>

      <div class="problem-meta" id="problemNumberLabel">問題番号：3-A-02-01-b-01</div>
    </section>

    <section class="card answer-card" aria-labelledby="answerTitle">
      <div class="result-status">
        <h2 class="panel-title" id="answerTitle">
          <span class="material-symbols-outlined">edit_note</span>
          あなたの解答
        </h2>
        <div class="status-pill" id="statusPill">
          <span class="material-symbols-outlined" id="statusIcon">check_circle</span>
          <span id="statusText">正解</span>
        </div>
      </div>

      <div class="correct-celebration" aria-label="正解時のフィードバック">
        <span class="celebration-icon material-symbols-outlined" id="feedbackIcon">workspace_premium</span>
        <div class="celebration-copy">
          <b id="feedbackTitle">いい調子、正解です</b>
          <span id="feedbackText">この1問で累積解答数に +1問。次の問題へ進む準備ができました。</span>
        </div>
      </div>

      <div class="answer-paper">
        <div class="answer-label">あなたの解答</div>
        <div class="answer-value math-text" id="studentAnswer"></div>
        <div class="maru-mark" id="resultStamp" aria-hidden="true"><span class="stamp-label" id="stampLabel">正解</span></div>
        <div class="answer-badge" id="answerBadge">正解</div>
      </div>
    </section>

    <section class="card explain-card" aria-labelledby="explainTitle">
      <div class="explain-head">
        <span class="tag" id="answerTag">解答</span>
        <div class="answer-formula math-text" id="correctAnswer"></div>
      </div>
      <div class="summary-strip">
        <span class="summary-chip" id="levelLabel">基礎レベル</span>
        <span class="summary-chip" id="abilityLabel">学習項目</span>
        <span class="summary-chip" id="difficultySummary">難易度 180 / 300</span>
      </div>
      <h2 class="panel-title" id="explainTitle">
        <span class="material-symbols-outlined">tips_and_updates</span>
        解説
      </h2>
      <div class="explain-body" id="explanationBody"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a id="nextQuestionLink" class="primary-action" href="SCR-09-01.html?q=2">
        次の問題へ
        <span class="material-symbols-outlined">arrow_forward</span>
      </a>
    </div>
  </footer>

  <script>
    (function(){
      const data = window.MATH_QUESTIONS_3_A_02 || { unitTitle: '因数分解', questions: [] };
      const questions = Array.isArray(data.questions) ? data.questions : [];
      const total = Math.max(questions.length, 1);
      let currentIndex = getQuestionIndex();
      let currentQuestion = null;

      function escapeHtml(value){
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
          '&':'&amp;',
          '<':'&lt;',
          '>':'&gt;',
          '"':'&quot;',
          "'":'&#39;'
        }[ch]));
      }

      function getQuestionIndex(){
        const params = new URLSearchParams(window.location.search);
        const fromQuery = Number(params.get('q'));
        const fromSession = Number(sessionStorage.getItem('currentMathQuestionIndex'));
        const candidate = Number.isFinite(fromQuery) && fromQuery > 0 ? fromQuery : fromSession;
        if(!Number.isFinite(candidate) || candidate < 1) return 1;
        return Math.min(Math.max(Math.round(candidate), 1), total);
      }

      function normalizeMathSource(raw){
        return String(raw ?? '')
          .replace(/\\begin\{[^}]+\}|\\end\{[^}]+\}/g, '')
          .replace(/\\hl(?:blue|pink)\{([^{}]*)\}/g, '$1')
          .replace(/\\left|\\right/g, '')
          .replace(/\\times/g, '×')
          .replace(/\\cdot/g, '・')
          .replace(/\\qquad|\\quad/g, '  ')
          .replace(/\\,/g, ' ')
          .replace(/\\\[/g, '')
          .replace(/\\\]/g, '')
          .replace(/\$/g, '')
          .replace(/&/g, '')
          .replace(/\\\\/g, '  ')
          .replace(/\\([{}])/g, '$1')
          .replace(/\\/g, '')
          .trim();
      }

      function renderMath(raw){
        const source = normalizeMathSource(raw);
        let html = '';
        for(let i = 0; i < source.length; i++){
          const ch = source[i];
          if(ch === '^'){
            let exponent = '';
            if(source[i + 1] === '{'){
              const end = source.indexOf('}', i + 2);
              if(end !== -1){
                exponent = source.slice(i + 2, end);
                i = end;
              }
            } else if(source[i + 1]){
              exponent = source[i + 1];
              i += 1;
            }
            html += '<sup>' + renderMath(exponent) + '</sup>';
          } else if(/[A-Za-z]/.test(ch)){
            html += '<span class="var math-var">' + escapeHtml(ch) + '</span>';
          } else if(ch === '-'){
            html += ' &minus; ';
          } else if(ch === '+'){
            html += ' + ';
          } else if(ch === '='){
            html += ' = ';
          } else if(ch === '×' || ch === '・'){
            html += ' ' + ch + ' ';
          } else if(ch === ','){
            html += ', ';
          } else {
            html += escapeHtml(ch);
          }
        }
        return html
          .replace(/\s+/g, ' ')
          .replace(/\(\s+/g, '(')
          .replace(/\s+\)/g, ')')
          .trim();
      }

      function renderInline(text){
        const parts = String(text ?? '').split(/(\$[^$]+\$)/g);
        return parts.map((part) => {
          if(part.startsWith('$') && part.endsWith('$')){
            return '<span class="math-text">' + renderMath(part.slice(1, -1)) + '</span>';
          }
          return escapeHtml(part).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }).join('');
      }

      function renderMathBlock(raw){
        const lines = String(raw ?? '')
          .replace(/\\begin\{[^}]+\}|\\end\{[^}]+\}/g, '')
          .split(/\\\\/)
          .map((line) => line.trim())
          .filter(Boolean);
        const rendered = lines.length ? lines : [raw];
        return '<div class="formula-block">' + rendered.map((line) => {
          return '<span class="formula-line math-text">' + renderMath(line) + '</span>';
        }).join('') + '</div>';
      }

      function renderExplanation(raw){
        const source = String(raw ?? '').trim();
        if(!source) return '<p>解説データを準備中です。</p>';
        const stepRegex = /\*\*ステップ(\d+)：\*\*\s*([^\n]*)/g;
        const matches = [];
        let stepMatch;
        while((stepMatch = stepRegex.exec(source)) !== null){
          matches.push({
            number: stepMatch[1],
            title: stepMatch[2].trim(),
            index: stepMatch.index,
            endOfHeading: stepRegex.lastIndex
          });
        }
        if(matches.length){
          const intro = source.slice(0, matches[0].index).trim();
          const introHtml = intro ? '<div class="explain-intro">' + renderExplanationBlocks(intro) + '</div>' : '';
          const stepsHtml = matches.map((step, index) => {
            const next = matches[index + 1];
            const body = source.slice(step.endOfHeading, next ? next.index : source.length).trim();
            const label = `ステップ${step.number}： ${step.title}`;
            return [
              '<details class="step-accordion">',
              '<summary><span>' + renderInline(label) + '</span><span class="step-chevron">▼</span></summary>',
              '<div class="step-content">' + renderExplanationBlocks(body) + '</div>',
              '</details>'
            ].join('');
          }).join('');
          return introHtml + '<div class="step-list">' + stepsHtml + '</div>';
        }
        return renderExplanationBlocks(source);
      }

      function renderExplanationBlocks(source){
        const blocks = [];
        const regex = /\\\[((?:.|\n)*?)\\\]/g;
        let lastIndex = 0;
        let match;
        while((match = regex.exec(source)) !== null){
          const textPart = source.slice(lastIndex, match.index);
          if(textPart.trim()) blocks.push(renderTextBlocks(textPart));
          blocks.push(renderMathBlock(match[1]));
          lastIndex = regex.lastIndex;
        }
        const rest = source.slice(lastIndex);
        if(rest.trim()) blocks.push(renderTextBlocks(rest));
        return blocks.join('');
      }

      function renderTextBlocks(text){
        return String(text)
          .trim()
          .split(/\n{2,}/)
          .filter((block) => block.trim())
          .map((block) => '<p>' + block.split(/\n/).map((line) => renderInline(line.trim())).join('<br>') + '</p>')
          .join('');
      }

      function setText(id, text){
        const el = document.getElementById(id);
        if(el) el.textContent = text;
      }

      function setHtml(id, html){
        const el = document.getElementById(id);
        if(el) el.innerHTML = html;
      }

      function getLearningType(question){
        const map = {
          '3-A-02-01':'共通因数',
          '3-A-02-02':'積と和',
          '3-A-02-03':'平方公式',
          '3-A-02-04':'平方の差',
          '3-A-02-05':'共通因数＋公式'
        };
        return map[question?.itemId] || question?.ability || '学習項目';
      }

      function getForcedResult(){
        const params = new URLSearchParams(window.location.search);
        const value = String(params.get('result') || '').toLowerCase();
        if(['correct', 'ok', 'true', '1'].includes(value)) return 'correct';
        if(['incorrect', 'wrong', 'ng', 'false', '0'].includes(value)) return 'incorrect';
        return '';
      }

      function resolveResultState(question){
        const forced = getForcedResult();
        if(forced) return forced;
        const key = `mathResultState:${question?.id || currentIndex}`;
        const cached = sessionStorage.getItem(key);
        if(cached === 'correct' || cached === 'incorrect') return cached;
        const randomState = Math.random() < 0.5 ? 'correct' : 'incorrect';
        sessionStorage.setItem(key, randomState);
        return randomState;
      }

      function getSimulatedIncorrectAnswer(question){
        if(question?.incorrectAnswer) return question.incorrectAnswer;
        const examples = {
          1:'3x(x+2)',
          2:'-4ab(2a-3b-1)',
          3:'(x+4)(x+6)',
          4:'(x-6)(x+6)',
          5:'(x+7)^2',
          6:'(5x-3)^2',
          7:'(x+9)^2',
          8:'(6x+11y)^2',
          9:'5(x^2-4)',
          10:'4(a^2-6a+9)'
        };
        return examples[currentIndex] || String(question?.formula || '').replace(/\+/, '-');
      }

      function applyResultState(state){
        const isCorrect = state === 'correct';
        const answerCard = document.querySelector('.answer-card');
        if(answerCard){
          answerCard.classList.toggle('is-correct', isCorrect);
          answerCard.classList.toggle('is-incorrect', !isCorrect);
        }
        const feedbackCard = document.querySelector('.correct-celebration');
        if(feedbackCard){
          feedbackCard.setAttribute('aria-label', isCorrect ? '正解時のフィードバック' : '不正解時のフィードバック');
        }

        setText('statusIcon', isCorrect ? 'check_circle' : 'error');
        setText('statusText', isCorrect ? '正解' : '不正解');
        setText('feedbackIcon', isCorrect ? 'workspace_premium' : 'psychology_alt');
        setText('feedbackTitle', isCorrect ? 'いい調子、正解です' : 'あと少し、見直せば届きます');
        setText(
          'feedbackText',
          isCorrect
            ? 'この1問で累積解答数に +1問。次の問題へ進む準備ができました。'
            : '考え方の近いところまで来ています。下の正しい解答とステップを見て、どこでずれたか確認しましょう。'
        );
        setText('answerBadge', isCorrect ? '正解' : '要確認');
        setText('stampLabel', isCorrect ? '正解' : '見直し');
        setText('answerTag', isCorrect ? '解答' : '正しい解答');

        const stamp = document.getElementById('resultStamp');
        if(stamp){
          stamp.className = isCorrect ? 'maru-mark' : 'batsu-mark';
        }

        setHtml('studentAnswer', renderMath(isCorrect ? currentQuestion.answer : getSimulatedIncorrectAnswer(currentQuestion)));
        renderFootprints(isCorrect ? 'correct' : 'incorrect');
      }

      function renderFootprints(mode){
        const container = document.getElementById('footprints');
        if(!container) return;
        container.innerHTML = Array.from({ length: total }, (_, index) => {
          const number = index + 1;
          let state = '';
          if(number < currentIndex) state = 'done';
          if(number === currentIndex) state = mode === 'correct' ? 'correct' : mode === 'incorrect' ? 'incorrect' : 'current';
          const label = state === 'done' || state === 'correct'
            ? '完了'
            : state === 'incorrect'
              ? '見直し'
              : state === 'current'
                ? '学習中'
                : '未実施';
          return `<span class="footprint-dot ${state}" title="${number}問目 ${label}" aria-label="${number}問目 ${label}"></span>`;
        }).join('');
      }

      function renderQuestion(){
        currentQuestion = questions[currentIndex - 1] || questions[0] || {
          prompt:'次の式を因数分解しなさい。',
          formula:'3x^2y+6xy',
          answer:'3xy(x+2)',
          explanation:'',
          irtDifficulty:205,
          levelLabel:'基礎レベル',
          ability:'共通因数',
          problemNumber:'3-A-02-01-b-01'
        };
        sessionStorage.setItem('currentMathQuestionIndex', String(currentIndex));
        setText('unitTitle', data.unitTitle || '因数分解');
        setText('questionCounter', `第 ${currentIndex} 問 / 全 ${total} 問`);
        setText('questionIndexLabel', `【問題${currentIndex}】`);
        setText('questionPrompt', currentQuestion.prompt || '次の式を因数分解しなさい。');
        setText('learningItemTag', getLearningType(currentQuestion));
        setText('difficultyLabel', `難易度 ${currentQuestion.irtDifficulty ?? '-'} / 300`);
        setText('difficultySummary', `難易度 ${currentQuestion.irtDifficulty ?? '-'} / 300`);
        setText('problemNumberLabel', `問題番号：${currentQuestion.problemNumber || currentQuestion.itemId || '-'}`);
        setText('levelLabel', currentQuestion.levelLabel || '基礎レベル');
        setText('abilityLabel', getLearningType(currentQuestion));
        setHtml('questionFormula', renderMath(currentQuestion.formula));
        setHtml('correctAnswer', renderMath(currentQuestion.answer));
        setHtml('explanationBody', renderExplanation(currentQuestion.explanation));
        const formula = document.getElementById('questionFormula');
        if(formula) formula.setAttribute('aria-label', normalizeMathSource(currentQuestion.formula));
        const progress = document.getElementById('progressBar');
        if(progress) progress.style.width = `${Math.max(8, Math.round(currentIndex / total * 100))}%`;
        applyResultState(resolveResultState(currentQuestion));
        const next = document.getElementById('nextQuestionLink');
        if(next){
          if(currentIndex >= total){
            next.href = 'SCR-014.html';
            next.innerHTML = '結果を見る <span class="material-symbols-outlined">arrow_forward</span>';
          } else {
            next.href = `SCR-09-01.html?q=${currentIndex + 1}`;
            next.innerHTML = '次の問題へ <span class="material-symbols-outlined">arrow_forward</span>';
          }
        }
      }

      function navigateSoft(url){
        document.body.classList.add('is-leaving');
        window.setTimeout(() => {
          window.location.href = url;
        }, 180);
      }

      renderQuestion();

      document.getElementById('nextQuestionLink')?.addEventListener('click', (event) => {
        event.preventDefault();
        navigateSoft(event.currentTarget.href);
      });
      document.getElementById('backBtn')?.addEventListener('click', () => {
        navigateSoft(`SCR-09-01.html?q=${currentIndex}`);
      });
      document.getElementById('closeBtn')?.addEventListener('click', () => {
        navigateSoft('SCR-002.html');
      });

      window.setTimeout(() => document.body.classList.add('is-ready'), 20);
    })();
  </script>
</body>
