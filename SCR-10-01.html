  <script>
    (function(){
      const data = window.MATH_QUESTIONS_3_A_02 || { unitTitle: '因数分解', questions: [] };
      const questions = Array.isArray(data.questions) ? data.questions : [];
      const total = Math.max(questions.length, 1);
      let currentIndex = getQuestionIndex();
      let currentQuestion = null;

      function escapeHtml(value){
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
          '&':'&amp;',
          '<':'&lt;',
          '>':'&gt;',
          '"':'&quot;',
          "'":'&#39;'
        }[ch]));
      }

      function getQuestionIndex(){
        const params = new URLSearchParams(window.location.search);
        const fromQuery = Number(params.get('q'));
        const fromSession = Number(sessionStorage.getItem('currentMathQuestionIndex'));
        const candidate = Number.isFinite(fromQuery) && fromQuery > 0 ? fromQuery : fromSession;
        if(!Number.isFinite(candidate) || candidate < 1) return 1;
        return Math.min(Math.max(Math.round(candidate), 1), total);
      }

      function normalizeMathSource(raw){
        return String(raw ?? '')
          .replace(/\\begin\{[^}]+\}|\\end\{[^}]+\}/g, '')
          .replace(/\\hl(?:blue|pink)\{([^{}]*)\}/g, '$1')
          .replace(/\\left|\\right/g, '')
          .replace(/\\times/g, '×')
          .replace(/\\cdot/g, '・')
          .replace(/\\qquad|\\quad/g, '  ')
          .replace(/\\,/g, ' ')
          .replace(/\\\[/g, '')
          .replace(/\\\]/g, '')
          .replace(/\$/g, '')
          .replace(/&/g, '')
          .replace(/\\\\/g, '  ')
          .replace(/\\([{}])/g, '$1')
          .replace(/\\/g, '')
          .trim();
      }

      function renderMath(raw){
        const source = normalizeMathSource(raw);
        let html = '';
        for(let i = 0; i < source.length; i++){
          const ch = source[i];
          if(ch === '^'){
            let exponent = '';
            if(source[i + 1] === '{'){
              const end = source.indexOf('}', i + 2);
              if(end !== -1){
                exponent = source.slice(i + 2, end);
                i = end;
              }
            } else if(source[i + 1]){
              exponent = source[i + 1];
              i += 1;
            }
            html += '<sup>' + renderMath(exponent) + '</sup>';
          } else if(/[A-Za-z]/.test(ch)){
            html += '<span class="var math-var">' + escapeHtml(ch) + '</span>';
          } else if(ch === '-'){
            html += ' &minus; ';
          } else if(ch === '+'){
            html += ' + ';
          } else if(ch === '='){
            html += ' = ';
          } else if(ch === '×' || ch === '・'){
            html += ' ' + ch + ' ';
          } else if(ch === ','){
            html += ', ';
          } else {
            html += escapeHtml(ch);
          }
        }
        return html
          .replace(/\s+/g, ' ')
          .replace(/\(\s+/g, '(')
          .replace(/\s+\)/g, ')')
          .trim();
      }

      function renderInline(text){
        const parts = String(text ?? '').split(/(\$[^$]+\$)/g);
        return parts.map((part) => {
          if(part.startsWith('$') && part.endsWith('$')){
            return '<span class="math-text">' + renderMath(part.slice(1, -1)) + '</span>';
          }
          return escapeHtml(part).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }).join('');
      }

      function renderMathBlock(raw){
        const lines = String(raw ?? '')
          .replace(/\\begin\{[^}]+\}|\\end\{[^}]+\}/g, '')
          .split(/\\\\/)
          .map((line) => line.trim())
          .filter(Boolean);
        const rendered = lines.length ? lines : [raw];
        return '<div class="formula-block">' + rendered.map((line) => {
          return '<span class="formula-line math-text">' + renderMath(line) + '</span>';
        }).join('') + '</div>';
      }

      function renderExplanation(raw){
        const source = String(raw ?? '').trim();
        if(!source) return '<p>解説データを準備中です。</p>';
        const stepRegex = /\*\*ステップ(\d+)：\*\*\s*([^\n]*)/g;
        const matches = [];
        let stepMatch;
        while((stepMatch = stepRegex.exec(source)) !== null){
          matches.push({
            number: stepMatch[1],
            title: stepMatch[2].trim(),
            index: stepMatch.index,
            endOfHeading: stepRegex.lastIndex
          });
        }
        if(matches.length){
          const intro = source.slice(0, matches[0].index).trim();
          const introHtml = intro ? '<div class="explain-intro">' + renderExplanationBlocks(intro) + '</div>' : '';
          const stepsHtml = matches.map((step, index) => {
            const next = matches[index + 1];
            const body = source.slice(step.endOfHeading, next ? next.index : source.length).trim();
            const label = `ステップ${step.number}： ${step.title}`;
            return [
              '<details class="step-accordion">',
              '<summary><span>' + renderInline(label) + '</span><span class="step-chevron">▼</span></summary>',
              '<div class="step-content">' + renderExplanationBlocks(body) + '</div>',
              '</details>'
            ].join('');
          }).join('');
          return introHtml + '<div class="step-list">' + stepsHtml + '</div>';
        }
        return renderExplanationBlocks(source);
      }

      function renderExplanationBlocks(source){
        const blocks = [];
        const regex = /\\\[((?:.|\n)*?)\\\]/g;
        let lastIndex = 0;
        let match;
        while((match = regex.exec(source)) !== null){
          const textPart = source.slice(lastIndex, match.index);
          if(textPart.trim()) blocks.push(renderTextBlocks(textPart));
          blocks.push(renderMathBlock(match[1]));
          lastIndex = regex.lastIndex;
        }
        const rest = source.slice(lastIndex);
        if(rest.trim()) blocks.push(renderTextBlocks(rest));
        return blocks.join('');
      }

      function renderTextBlocks(text){
        return String(text)
          .trim()
          .split(/\n{2,}/)
          .filter((block) => block.trim())
          .map((block) => '<p>' + block.split(/\n/).map((line) => renderInline(line.trim())).join('<br>') + '</p>')
          .join('');
      }

      function setText(id, text){
        const el = document.getElementById(id);
        if(el) el.textContent = text;
      }

      function setHtml(id, html){
        const el = document.getElementById(id);
        if(el) el.innerHTML = html;
      }

      function getLearningType(question){
        const map = {
          '3-A-02-01':'共通因数',
          '3-A-02-02':'積と和',
          '3-A-02-03':'平方公式',
          '3-A-02-04':'平方の差',
          '3-A-02-05':'共通因数＋公式'
        };
        return map[question?.itemId] || question?.ability || '学習項目';
      }

      function renderFootprints(mode){
        const container = document.getElementById('footprints');
        if(!container) return;
        container.innerHTML = Array.from({ length: total }, (_, index) => {
          const number = index + 1;
          let state = '';
          if(number < currentIndex) state = 'done';
          if(number === currentIndex) state = mode === 'correct' ? 'correct' : 'current';
          const label = state === 'done' || state === 'correct' ? '完了' : state === 'current' ? '学習中' : '未実施';
          return `<span class="footprint-dot ${state}" title="${number}問目 ${label}" aria-label="${number}問目 ${label}"></span>`;
        }).join('');
      }

      function renderQuestion(){
        currentQuestion = questions[currentIndex - 1] || questions[0] || {
          prompt:'次の式を因数分解しなさい。',
          formula:'3x^2y+6xy',
          answer:'3xy(x+2)',
          explanation:'',
          irtDifficulty:205,
          levelLabel:'基礎レベル',
          ability:'共通因数',
          problemNumber:'3-A-02-01-b-01'
        };
        sessionStorage.setItem('currentMathQuestionIndex', String(currentIndex));
        setText('unitTitle', data.unitTitle || '因数分解');
        setText('questionCounter', `第 ${currentIndex} 問 / 全 ${total} 問`);
        setText('questionIndexLabel', `【問題${currentIndex}】`);
        setText('questionPrompt', currentQuestion.prompt || '次の式を因数分解しなさい。');
        setText('learningItemTag', getLearningType(currentQuestion));
        setText('difficultyLabel', `難易度 ${currentQuestion.irtDifficulty ?? '-'} / 300`);
        setText('difficultySummary', `難易度 ${currentQuestion.irtDifficulty ?? '-'} / 300`);
        setText('problemNumberLabel', `問題番号：${currentQuestion.problemNumber || currentQuestion.itemId || '-'}`);
        setText('levelLabel', currentQuestion.levelLabel || '基礎レベル');
        setText('abilityLabel', getLearningType(currentQuestion));
        setHtml('questionFormula', renderMath(currentQuestion.formula));
        setHtml('studentAnswer', renderMath(currentQuestion.answer));
        setHtml('correctAnswer', renderMath(currentQuestion.answer));
        setHtml('explanationBody', renderExplanation(currentQuestion.explanation));
        const formula = document.getElementById('questionFormula');
        if(formula) formula.setAttribute('aria-label', normalizeMathSource(currentQuestion.formula));
        const progress = document.getElementById('progressBar');
        if(progress) progress.style.width = `${Math.max(8, Math.round(currentIndex / total * 100))}%`;
        renderFootprints('correct');
        const next = document.getElementById('nextQuestionLink');
        if(next){
          if(currentIndex >= total){
            next.href = 'SCR-014.html';
            next.innerHTML = '結果を見る <span class="material-symbols-outlined">arrow_forward</span>';
          } else {
            next.href = `SCR-09-01.html?q=${currentIndex + 1}`;
            next.innerHTML = '次の問題へ <span class="material-symbols-outlined">arrow_forward</span>';
          }
        }
      }

      function navigateSoft(url){
        document.body.classList.add('is-leaving');
        window.setTimeout(() => {
          window.location.href = url;
        }, 180);
      }

      renderQuestion();

      document.getElementById('nextQuestionLink')?.addEventListener('click', (event) => {
        event.preventDefault();
        navigateSoft(event.currentTarget.href);
      });
      document.getElementById('backBtn')?.addEventListener('click', () => {
        navigateSoft(`SCR-09-01.html?q=${currentIndex}`);
      });
      document.getElementById('closeBtn')?.addEventListener('click', () => {
        navigateSoft('SCR-002.html');
      });

      window.setTimeout(() => document.body.classList.add('is-ready'), 20);
    })();
  </script>
</body>
