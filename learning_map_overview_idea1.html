<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>案1 改良版 - 学習系統ビュー</title>
  <style>
    :root {
      --ink: #202124;
      --muted: #5f6368;
      --line: #d9dee5;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --done: #2f80ed;
      --done-bg: #e7f1ff;
      --active: #c88719;
      --active-bg: #fff4da;
      --weak: #d94b4b;
      --weak-bg: #fdeaea;
      --next: #2e9d65;
      --next-bg: #e9f7ef;
      --locked: #8b949e;
      --locked-bg: #eef1f4;
      --violet: #7357ff;
      --violet-bg: #f0edff;
      --shadow: 0 12px 28px rgba(32, 33, 36, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      line-height: 1.6;
    }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    h1 { margin: 0 0 6px; font-size: 24px; line-height: 1.25; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    h3 { margin: 0 0 6px; font-size: 15px; }
    p { margin: 0; }
    .lead { max-width: 880px; color: var(--muted); font-size: 13px; }

    .stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .stat { min-width: 92px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; padding: 8px 10px; }
    .stat b { display: block; font-size: 18px; line-height: 1.15; }
    .stat span { color: var(--muted); font-size: 11px; font-weight: 800; }

    main { padding: 18px; display: grid; grid-template-columns: 310px 1fr 360px; gap: 16px; min-height: 0; }
    aside, section.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); }
    aside { padding: 16px; overflow: auto; }
    .center { display: grid; gap: 16px; min-width: 0; }
    .panel { overflow: hidden; }
    .panel-head { padding: 13px 15px; border-bottom: 1px solid var(--line); background: #fbfcfd; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .panel-body { padding: 14px; }

    .control { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
    .control:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
    label { display: block; color: var(--muted); font-size: 12px; font-weight: 800; margin-bottom: 5px; }
    select, input { width: 100%; border: 1px solid var(--line); border-radius: 7px; background: #fff; padding: 9px 10px; font-size: 14px; }
    .buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: 1px solid var(--line); border-radius: 7px; background: #fff; padding: 8px 10px; font-weight: 800; cursor: pointer; }
    button.primary { background: #202124; border-color: #202124; color: #fff; }

    .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .pill::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: currentColor; }
    .done { color: #165bb8; background: var(--done-bg); }
    .active { color: #845100; background: var(--active-bg); }
    .weak { color: #a72f2f; background: var(--weak-bg); }
    .next { color: #1d7047; background: var(--next-bg); }
    .locked { color: #59616b; background: var(--locked-bg); }

    .unit-map { overflow-x: auto; }
    .unit-lanes { min-width: 980px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .grade-lane { border: 1px solid var(--line); border-radius: 9px; background: #fff; padding: 12px; }
    .grade-title { font-weight: 900; margin-bottom: 10px; }
    .unit-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #fbfcfd; cursor: pointer; }
    .unit-card:hover, .unit-card.selected { border-color: var(--violet); outline: 3px solid rgba(115, 87, 255, 0.12); }
    .unit-card strong { display: block; font-size: 13px; }
    .unit-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .bar { height: 6px; border-radius: 99px; overflow: hidden; background: #e8edf3; margin-top: 8px; }
    .bar i { display: block; height: 100%; background: var(--done); }

    .focus-grid { display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: 12px; align-items: stretch; }
    .focus-col { min-height: 300px; border: 1px solid var(--line); border-radius: 9px; background: #fbfcfd; padding: 12px; }
    .focus-title { color: var(--muted); font-size: 12px; font-weight: 900; margin-bottom: 10px; }
    .node-list { display: grid; gap: 8px; }
    .node-card { width: 100%; text-align: left; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 10px; cursor: pointer; }
    .node-card:hover { border-color: var(--violet); }
    .node-card.current { border-color: var(--violet); background: var(--violet-bg); outline: 3px solid rgba(115,87,255,.16); }
    .node-code { font-size: 12px; font-weight: 900; }
    .node-item { font-size: 13px; font-weight: 720; margin-top: 3px; }
    .node-unit { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .empty { color: var(--muted); font-size: 13px; }

    .route { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
    .route-node { min-width: 190px; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 10px; font-size: 12px; }
    .arrow { display: flex; align-items: center; color: var(--muted); font-weight: 900; }

    .side-card { border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; padding: 12px; margin-bottom: 12px; }
    .side-card:last-child { margin-bottom: 0; }
    .readiness b { font-size: 34px; color: var(--violet); line-height: 1; }
    .risk-list { display: grid; gap: 8px; margin-top: 10px; }
    .risk { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 9px; }
    .risk.hot { border-color: var(--weak); background: var(--weak-bg); }
    .note { color: var(--muted); font-size: 12px; }

    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      .focus-grid { grid-template-columns: 1fr; }
      header { display: block; }
      .stats { justify-content: flex-start; margin-top: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>案1 改良版：学習系統ビュー</h1>
        <p class="lead">全体グラフをそのまま見せるのではなく、上段で単元レベルの大きな道筋、中央で現在地周辺、右側で前提の習得状況を表示します。</p>
      </div>
      <div class="stats">
        <div class="stat"><b id="nodeCount">122</b><span>学習項目</span></div>
        <div class="stat"><b id="unitCount">14</b><span>単元グループ</span></div>
        <div class="stat"><b id="readyScore">--</b><span>前提準備度</span></div>
      </div>
    </header>

    <main>
      <aside>
        <div class="control">
          <h2>現在地を選ぶ</h2>
          <label for="search">項目番号・単元名・項目名</label>
          <input id="search" type="search" placeholder="例：3-A-05-03 / 因数分解">
        </div>
        <div class="control">
          <label for="itemSelect">学習項目</label>
          <select id="itemSelect"></select>
        </div>
        <div class="control">
          <label for="unitSelect">単元から見る</label>
          <select id="unitSelect"><option value="all">すべての単元</option></select>
        </div>
        <div class="control">
          <h2>表示の意図</h2>
          <p class="note">生徒には「大きな地図」と「現在地周辺」だけをまず見せます。先生は右側で前提不足を確認できます。</p>
        </div>
        <div class="control">
          <div class="buttons">
            <button id="targetQuadratic" class="primary">2次方程式を目標にする</button>
            <button id="targetCurrent">現在地へ戻る</button>
          </div>
        </div>
      </aside>

      <div class="center">
        <section class="panel">
          <div class="panel-head">
            <h2>1. 大きな学習系統</h2>
            <span class="note">単元単位で、どこからどこへ進むかを見る</span>
          </div>
          <div class="panel-body unit-map">
            <div id="unitLanes" class="unit-lanes"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>2. 現在地周辺の拡大図</h2>
            <span id="focusTitle" class="note"></span>
          </div>
          <div class="panel-body">
            <div class="focus-grid">
              <div class="focus-col">
                <div class="focus-title">直前の前提</div>
                <div id="preList" class="node-list"></div>
              </div>
              <div class="focus-col">
                <div class="focus-title">現在地</div>
                <div id="currentBox" class="node-list"></div>
              </div>
              <div class="focus-col">
                <div class="focus-title">次につながる項目</div>
                <div id="nextList" class="node-list"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>3. 目標までの代表ルート</h2>
            <span class="note">前提をたどって、学習の道筋を短く表示</span>
          </div>
          <div class="panel-body">
            <div id="route" class="route"></div>
          </div>
        </section>
      </div>

      <aside>
        <div class="side-card readiness">
          <h2>前提の習得状況</h2>
          <b id="readiness">--</b>
          <p id="readinessText" class="note"></p>
        </div>
        <div class="side-card">
          <h2>前提不足の候補</h2>
          <div id="riskList" class="risk-list"></div>
        </div>
        <div class="side-card">
          <h2>次のアクション</h2>
          <p id="actionText" class="note"></p>
        </div>
      </aside>
    </main>
  </div>

  <script>
    (() => {
      const data = JSON.parse(document.getElementById('graph-data').textContent);
      const nodes = data.nodes;
      const labels = data.statusLabels;
      const byId = new Map(nodes.map(n => [n.id, n]));
      const unitSummary = data.unitSummary;
      let selected = 'm-jh3-A-05-03b';
      let unitFilter = 'all';

      const itemSelect = document.getElementById('itemSelect');
      const unitSelect = document.getElementById('unitSelect');
      const search = document.getElementById('search');

      const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      const statusPill = n => `<span class="pill ${n.status}">${labels[n.status]} ${n.mastery}%</span>`;
      const isRisk = n => n.status === 'weak' || n.status === 'locked' || n.mastery < 60;

      function optionLabel(n) { return `${n.code} ${n.unit} / ${n.item}`; }

      function populateControls() {
        for (const n of nodes) {
          const option = document.createElement('option');
          option.value = n.id;
          option.textContent = optionLabel(n);
          itemSelect.appendChild(option);
        }
        for (const u of unitSummary) {
          const option = document.createElement('option');
          option.value = u.unitGroup;
          option.textContent = u.unitGroup;
          unitSelect.appendChild(option);
        }
      }

      function filteredNodes() {
        const q = search.value.trim().toLowerCase();
        return nodes.filter(n => {
          if (unitFilter !== 'all' && n.unitGroup !== unitFilter) return false;
          if (!q) return true;
          return `${n.code} ${n.unit} ${n.item} ${n.file}`.toLowerCase().includes(q);
        });
      }

      function renderItemOptions() {
        const current = selected;
        itemSelect.innerHTML = '';
        for (const n of filteredNodes()) {
          const option = document.createElement('option');
          option.value = n.id;
          option.textContent = optionLabel(n);
          itemSelect.appendChild(option);
        }
        if ([...itemSelect.options].some(o => o.value === current)) itemSelect.value = current;
        else if (itemSelect.options[0]) selected = itemSelect.options[0].value;
      }

      function renderUnits() {
        const lanes = document.getElementById('unitLanes');
        const grades = ['中1', '中2', '中3'];
        lanes.innerHTML = grades.map(g => `<div class="grade-lane"><div class="grade-title">${g}</div><div data-grade="${g}"></div></div>`).join('');
        for (const u of unitSummary) {
          if (unitFilter !== 'all' && unitFilter !== u.unitGroup) continue;
          const lane = lanes.querySelector(`[data-grade="${u.grade}"]`);
          if (!lane) continue;
          const selectedUnit = byId.get(selected)?.unitGroup === u.unitGroup;
          const div = document.createElement('button');
          div.className = 'unit-card' + (selectedUnit ? ' selected' : '');
          div.dataset.unit = u.unitGroup;
          div.innerHTML = `<strong>${esc(u.unit)}</strong><div class="unit-meta">${u.count}項目 / 平均 ${u.avg}%</div><div class="bar"><i style="width:${u.avg}%"></i></div>`;
          div.addEventListener('click', () => {
            unitFilter = u.unitGroup;
            unitSelect.value = u.unitGroup;
            const first = nodes.find(n => n.unitGroup === u.unitGroup);
            if (first) selected = first.id;
            render();
          });
          lane.appendChild(div);
        }
      }

      function nodeCard(id, current=false) {
        const n = byId.get(id);
        if (!n) return '';
        return `<button class="node-card${current ? ' current' : ''}" data-id="${esc(id)}"><div class="node-code">${esc(n.code)} ${statusPill(n)}</div><div class="node-item">${esc(n.item)}</div><div class="node-unit">${esc(n.grade)} / ${esc(n.unit)}</div></button>`;
      }

      function ancestors(id, depth=1, seen=new Set()) {
        if (depth > 3) return [];
        const n = byId.get(id);
        let out = [];
        for (const p of n?.prereq || []) {
          if (seen.has(p)) continue;
          seen.add(p);
          out.push(p);
          out = out.concat(ancestors(p, depth + 1, seen));
        }
        return out;
      }

      function representativeRoute(id) {
        const route = [];
        let cur = id;
        let guard = 0;
        while (cur && guard++ < 6) {
          route.unshift(cur);
          const n = byId.get(cur);
          const candidates = (n?.prereq || []).map(x => byId.get(x)).filter(Boolean);
          candidates.sort((a, b) => a.mastery - b.mastery);
          cur = candidates[0]?.id;
        }
        return route;
      }

      function renderFocus() {
        const n = byId.get(selected);
        if (!n) return;
        document.getElementById('focusTitle').textContent = `${n.code} ${n.item}`;
        document.getElementById('preList').innerHTML = (n.prereq || []).map(id => nodeCard(id)).join('') || '<p class="empty">直接の前提項目はありません。</p>';
        document.getElementById('currentBox').innerHTML = nodeCard(n.id, true);
        document.getElementById('nextList').innerHTML = (n.next || []).map(id => nodeCard(id)).join('') || '<p class="empty">直接つながる次項目はありません。</p>';
        const route = representativeRoute(n.id);
        document.getElementById('route').innerHTML = route.map((id, i) => `${i ? '<span class="arrow">→</span>' : ''}<div class="route-node">${nodeCard(id).replace('node-card', 'node-card route-inner')}</div>`).join('');
      }

      function renderSide() {
        const n = byId.get(selected);
        const allPre = ancestors(selected).map(id => byId.get(id)).filter(Boolean);
        const direct = (n.prereq || []).map(id => byId.get(id)).filter(Boolean);
        const target = direct.length ? direct : allPre;
        const score = target.length ? Math.round(target.reduce((sum, x) => sum + x.mastery, 0) / target.length) : 100;
        const risks = allPre.filter(isRisk).sort((a, b) => a.mastery - b.mastery).slice(0, 6);
        document.getElementById('readiness').textContent = score + '%';
        document.getElementById('readyScore').textContent = score + '%';
        document.getElementById('readinessText').textContent = target.length ? '直接前提を中心に算出しています。' : 'この項目には直接前提がありません。';
        document.getElementById('riskList').innerHTML = risks.length ? risks.map(x => `<div class="risk hot"><strong>${esc(x.code)} ${esc(x.item)}</strong><br>${statusPill(x)}</div>`).join('') : '<p class="empty">大きな前提不足は見当たりません。</p>';
        const action = risks.length
          ? `まず「${risks[0].code} ${risks[0].item}」へ戻ると、現在地の理解が安定しやすくなります。`
          : `前提はおおむね整っています。「${n.code} ${n.item}」の演習に進めます。`;
        document.getElementById('actionText').textContent = action;
      }

      function render() {
        renderItemOptions();
        itemSelect.value = selected;
        renderUnits();
        renderFocus();
        renderSide();
      }

      itemSelect.addEventListener('change', () => { selected = itemSelect.value; render(); });
      unitSelect.addEventListener('change', () => { unitFilter = unitSelect.value; render(); });
      search.addEventListener('input', () => { render(); });
      document.body.addEventListener('click', e => {
        const btn = e.target.closest('[data-id]');
        if (!btn) return;
        selected = btn.dataset.id;
        render();
      });
      document.getElementById('targetQuadratic').addEventListener('click', () => {
        unitFilter = '中3 2次方程式';
        unitSelect.value = unitFilter;
        selected = 'm-jh3-A-05-07b';
        search.value = '';
        render();
      });
      document.getElementById('targetCurrent').addEventListener('click', () => {
        unitFilter = 'all';
        unitSelect.value = 'all';
        selected = 'm-jh3-A-05-03b';
        search.value = '';
        render();
      });

      populateControls();
      render();
    })();
  </script>
</body>
</html>
