const byId=new Map(nodes.map(n=>[n.id,n]));
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const students=['Aさん','Bさん','Cさん','Dさん','Eさん','クラス平均'];function units(){const g=document.getElementById('grade').value;return[...new Set(nodes.filter(n=>g==='all'||n.grade===g).map(n=>n.unitGroup))].slice(0,12)}function val(student,unit){const ns=nodes.filter(n=>n.unitGroup===unit);let base=Math.round(ns.reduce((a,n)=>a+n.mastery,0)/ns.length);if(student!=='クラス平均')base+=((student.charCodeAt(0)+unit.length)%25)-12;return Math.max(20,Math.min(98,base))}function cls(v){return v>=80?'high':v>=50?'mid':'low'}function render(){const us=units(),mode=document.getElementById('mode').value,ss=mode==='class'?['クラス平均']:students;let lows=0,total=0,sum=0,worst=['',101];let html='<table><thead><tr><th>生徒</th>'+us.map(u=>`<th>${esc(u)}</th>`).join('')+'</tr></thead><tbody>';for(const s of ss){html+=`<tr><td class="name">${s}</td>`;for(const u of us){const v=val(s,u);sum+=v;total++;if(v<50)lows++;if(s==='クラス平均'&&v<worst[1])worst=[u,v];html+=`<td class="cell ${cls(v)}" data-student="${s}" data-unit="${esc(u)}">${v}</td>`}html+='</tr>'}html+='</tbody></table>';document.getElementById('heat').innerHTML=html;document.getElementById('avg').textContent=Math.round(sum/total)+'%';document.getElementById('lowCount').textContent=lows;document.getElementById('worstUnit').textContent=worst[0]?worst[0].replace(/^中\d /,''):'--';document.getElementById('unitCount').textContent=us.length}document.getElementById('grade').onchange=render;document.getElementById('mode').onchange=render;document.getElementById('heat').onclick=e=>{const c=e.target.closest('.cell');if(!c)return;const unit=c.dataset.unit;const weak=nodes.filter(n=>n.unitGroup===unit&&n.mastery<65).slice(0,8);document.getElementById('weakList').innerHTML=weak.map(n=>mini(n.id)).join('')||'<p class="empty">大きな弱点項目はありません。</p>';document.getElementById('insight').textContent=`${c.dataset.student} の ${unit} は ${c.textContent}% です。前提項目の確認と短い復習セットを出すとよさそうです。`};render();
