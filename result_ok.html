<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>数学・中間到達感画面</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "primary-light": "#eef4fd",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                        "text-main": "#0d131b",
                        "text-sub": "#4c6c9a",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans JP", "sans-serif"],
                        "body": ["Noto Sans JP", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "3xl": "2.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(19, 109, 236, 0.08)',
                        'float': '0 10px 40px -10px rgba(0, 0, 0, 0.08)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* Animation for the progress bar or trend */
        @keyframes gentle-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-slow {
            animation: gentle-pulse 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased selection:bg-primary/20 selection:text-primary min-h-screen flex items-center justify-center py-0 sm:py-8">
<!-- Mobile Device Container -->
<div class="relative flex flex-col w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[40px] bg-white dark:bg-slate-900 shadow-float overflow-hidden sm:border-[8px] sm:border-slate-200 dark:sm:border-slate-800">
<!-- Top App Bar -->
<header class="flex items-center justify-between px-6 pt-12 pb-4 bg-white dark:bg-slate-900 z-20 sticky top-0 sm:pt-6">
<div class="w-12 flex justify-start">
<!-- Placeholder for back if needed, but keeping clean as per request -->
</div>
<h1 class="text-sm font-bold text-text-main tracking-wider opacity-70">数学・復習ドリル</h1>
<button class="w-12 flex justify-end text-text-sub hover:text-primary transition-colors group">
<div class="flex flex-col items-center gap-[2px]">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0, 'wght' 400;">pause_circle</span>
<span class="text-[10px] font-bold">中断</span>
</div>
</button>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto px-6 pb-32 pt-2 scrollbar-hide">
<!-- Hero Section -->
<div class="flex flex-col items-center text-center mt-4 mb-8">
<div class="mb-4 inline-flex items-center justify-center size-16 rounded-full bg-green-100 text-green-600 animate-pulse-slow">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1, 'wght' 600;">thumb_up</span>
</div>
<h2 class="text-[26px] leading-[1.3] font-bold text-text-main mb-3">
                    いい感じ！<br/>
                    ここまでできています
                </h2>
<p class="text-text-sub text-sm font-medium leading-relaxed px-4">
                    変域の考え方が、<br/>少しずつ身についてきました
                </p>
</div>
<!-- Stats Dashboard Card -->
<div class="bg-slate-50 dark:bg-slate-800 rounded-3xl p-5 border border-slate-100 dark:border-slate-700 mb-6 relative overflow-hidden">
<!-- Decorative background blob -->
<div class="absolute top-[-20%] right-[-10%] w-32 h-32 bg-blue-100/50 dark:bg-blue-900/20 rounded-full blur-2xl pointer-events-none"></div>
<div class="relative z-10 flex flex-col gap-5">
<!-- Progress Row -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="text-xs font-bold text-text-sub uppercase tracking-wider">解いた数</span>
<div class="flex items-baseline gap-1">
<span class="text-xl font-bold text-text-main">3</span>
<span class="text-sm font-medium text-text-sub">/ 8</span>
</div>
</div>
<!-- Custom Segmented Progress Bar -->
<div class="flex gap-1.5 h-2.5 w-full">
<div class="flex-1 rounded-full bg-primary"></div>
<div class="flex-1 rounded-full bg-primary"></div>
<div class="flex-1 rounded-full bg-primary"></div>
<div class="flex-1 rounded-full bg-slate-200 dark:bg-slate-600"></div>
<div class="flex-1 rounded-full bg-slate-200 dark:bg-slate-600"></div>
<div class="flex-1 rounded-full bg-slate-200 dark:bg-slate-600"></div>
<div class="flex-1 rounded-full bg-slate-200 dark:bg-slate-600"></div>
<div class="flex-1 rounded-full bg-slate-200 dark:bg-slate-600"></div>
</div>
<div class="flex justify-between items-center mt-1">
<span class="text-xs font-medium text-green-600 bg-green-50 px-2 py-0.5 rounded">正解数: 2</span>
</div>
</div>
<div class="h-px w-full bg-slate-200 dark:bg-slate-700"></div>
<!-- Understanding Growth Row -->
<div class="flex items-center justify-between">
<div class="flex flex-col gap-1">
<span class="text-xs font-bold text-text-sub uppercase tracking-wider">推定学力</span>
<div class="flex items-center gap-1.5 text-primary font-bold">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1, 'wght' 700;">trending_up</span>
<span class="text-sm">わずかに上昇</span>
</div>
</div>
<!-- Mini visual gauge for growth -->
<div class="relative w-24 h-12 flex items-end justify-center pb-1">
<div class="absolute inset-0 bg-gradient-to-t from-primary/10 to-transparent rounded-lg"></div>
<!-- Bars simulating a graph -->
<div class="flex items-end gap-1 h-full px-2 py-2">
<div class="w-2 bg-primary/20 rounded-t-sm h-[40%]"></div>
<div class="w-2 bg-primary/40 rounded-t-sm h-[55%]"></div>
<div class="w-2 bg-primary/60 rounded-t-sm h-[45%]"></div>
<div class="w-2 bg-primary/80 rounded-t-sm h-[70%]"></div>
<div class="w-2 bg-primary rounded-t-sm h-[85%] animate-pulse"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Insight / Feedback Badge -->
<div class="bg-primary-light dark:bg-primary/10 rounded-2xl p-4 flex gap-3 items-start border border-primary/10 mb-6">
<span class="material-symbols-outlined text-primary text-[22px] mt-0.5 shrink-0" style="font-variation-settings: 'FILL' 1, 'wght' 600;">lightbulb</span>
<p class="text-sm text-text-main font-medium leading-relaxed">
<span class="font-bold text-primary block text-xs mb-1">GOOD POINT</span>
                    最大値・最小値の見つけ方が安定してきました
                </p>
</div>
<!-- Soft Encouragement -->
<div class="flex items-center justify-center gap-2 opacity-80 mb-4">
<span class="material-symbols-outlined text-orange-400 text-[20px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-xs font-bold text-text-sub">あと少しでこの単元を克服！</span>
</div>
</main>
<!-- Sticky Bottom Actions -->
<div class="absolute bottom-0 left-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 p-6 z-30 flex flex-col gap-3">
<!-- Primary CTA -->
<button class="w-full bg-primary hover:bg-blue-600 active:scale-[0.98] transition-all text-white font-bold text-lg h-14 rounded-2xl shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 group">
<span>このまま続ける</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Secondary CTA -->
<button class="w-full bg-transparent hover:bg-slate-50 dark:hover:bg-slate-800 text-text-sub font-medium text-sm h-10 rounded-xl transition-colors flex items-center justify-center">
<span>今日はここまで</span>
<span class="text-xs ml-2 opacity-70 font-normal">（続きから再開できます）</span>
</button>
</div>
</div>
</body></html>
